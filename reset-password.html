<body>
  <div class="reset-container">
    <div class="reset-card">
      <div class="reset-title">Reset <span>Password</span></div>
      <div class="reset-subtitle">Enter your new password below</div>
      
      <div id="status-message" class="reset-status loading" style="display: none;"></div>
      
      <div id="reset-form" style="display: none;">
        <div class="reset-group">
          <label class="reset-label" for="new-password">New Password</label>
          <input type="password" id="new-password" class="reset-input" placeholder="Enter new password" minlength="6" required>
        </div>
        <div class="reset-group">
          <label class="reset-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="reset-input" placeholder="Confirm new password" minlength="6" required>
        </div>
        <button class="reset-btn" onclick="handlePasswordReset()">Reset Password</button>
        <div id="reset-message"></div>
      </div>
      
      <a href="login.html" class="back-link">← Back to Login</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let accessToken = null;
    let refreshToken = null;
    let recoveryToken = null;

    // Parse URL hash parameters
    function parseHashParams() {
      const hash = window.location.hash.substring(1);
      const params = {};
      
      if (hash) {
        hash.split('&').forEach(param => {
          const [key, value] = param.split('=');
          if (key && value) {
            params[decodeURIComponent(key)] = decodeURIComponent(value);
          }
        });
      }
      
      return params;
    }

    // Initialize on page load
    async function init() {
      const params = parseHashParams();
      const statusEl = document.getElementById('status-message');
      const formEl = document.getElementById('reset-form');
      
      // Check for errors first
      if (params.error) {
        statusEl.style.display = 'block';
        statusEl.className = 'reset-status error';
        
        if (params.error_code === 'otp_expired') {
          statusEl.textContent = 'This password reset link has expired. Please request a new one.';
        } else if (params.error === 'access_denied') {
          statusEl.textContent = 'Access denied. The reset link may be invalid or expired.';
        } else {
          statusEl.textContent = `Error: ${params.error_description || params.error}`;
        }
        return;
      }
      
      // Check for access token (newer flow)
      if (params.access_token) {
        accessToken = params.access_token;
        refreshToken = params.refresh_token;
        
        try {
          // Set the session with the tokens
          const { data, error } = await sb.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          
          if (error) {
            throw error;
          }
          
          // Successfully authenticated, show form
          statusEl.style.display = 'none';
          formEl.style.display = 'block';
        } catch (error) {
          statusEl.style.display = 'block';
          statusEl.className = 'reset-status error';
          statusEl.textContent = `Error: ${error.message || 'Failed to verify reset link'}`;
        }
        return;
      }
      
      // Check for recovery token (older flow or query params)
      if (params.type === 'recovery' && params.token) {
        recoveryToken = params.token;
        statusEl.style.display = 'none';
        formEl.style.display = 'block';
        return;
      }
      
      // Also check URL search params (some Supabase configs use ? instead of #)
      const urlParams = new URLSearchParams(window.location.search);
      const urlType = urlParams.get('type');
      const urlToken = urlParams.get('token');
      if (urlType === 'recovery' && urlToken) {
        recoveryToken = urlToken;
        statusEl.style.display = 'none';
        formEl.style.display = 'block';
        return;
      }
      
      // Try to get session from hash - sometimes Supabase includes it differently
      if (window.location.hash.includes('access_token') || window.location.hash.includes('type=recovery')) {
        // Let Supabase handle the session
        const { data, error } = await sb.auth.getSession();
        if (!error && data.session) {
          statusEl.style.display = 'none';
          formEl.style.display = 'block';
          return;
        }
      }
      
      // No valid parameters found
      statusEl.style.display = 'block';
      statusEl.className = 'reset-status error';
      statusEl.textContent = 'Invalid reset link. Please check your email and try again. If the link has expired, request a new password reset.';
    }

    // Handle password reset
    async function handlePasswordReset() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageEl = document.getElementById('reset-message');
      const btn = document.querySelector('.reset-btn');
      
      // Clear previous messages
      messageEl.textContent = '';
      messageEl.className = 'reset-message';
      
      // Validate passwords
      if (!newPassword || newPassword.length < 6) {
        messageEl.className = 'reset-message error';
        messageEl.textContent = 'Password must be at least 6 characters long.';
        return;
      }
      
      if (newPassword !== confirmPassword) {
        messageEl.className = 'reset-message error';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }
      
      // Disable button
      btn.disabled = true;
      btn.textContent = 'Resetting...';
      messageEl.className = 'reset-message info';
      messageEl.textContent = 'Updating password...';
      
      try {
        let error = null;
        
        // If we have a session (from access_token), update password directly
        if (accessToken) {
          const { error: updateError } = await sb.auth.updateUser({
            password: newPassword
          });
          error = updateError;
        } 
        // If we have a recovery token, try to use it
        // Note: Recovery tokens in URL hash should have been handled by setSession above
        // This is a fallback for edge cases
        else if (recoveryToken) {
          // For recovery tokens, we need to set the session first
          // This should have been done in init(), but if not, try here
          const { error: resetError } = await sb.auth.updateUser({
            password: newPassword
          });
          error = resetError;
        } 
        // Try to get current session and update
        else {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            const { error: updateError } = await sb.auth.updateUser({
              password: newPassword
            });
            error = updateError;
          } else {
            throw new Error('No valid session found. Please use the link from your email.');
          }
        }
        
        if (error) {
          throw error;
        }
        
        // Success
        messageEl.className = 'reset-message success';
        messageEl.textContent = 'Password reset successfully! Redirecting...';
        
        // Redirect after a short delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (error) {
        messageEl.className = 'reset-message error';
        messageEl.textContent = `Error: ${error.message || 'Failed to reset password'}`;
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.getElementById('reset-form').style.display !== 'none') {
        handlePasswordReset();
      }
    });

    // Initialize on page load
    init();
  </script>
</body>
