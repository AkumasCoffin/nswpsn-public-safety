<body>
  <div class="verify-container">
    <div class="verify-card">
      <div class="verify-title">Verify <span>Email</span></div>
      <div class="verify-subtitle">Confirming your email address</div>
      
      <div id="status-container">
        <div id="status-icon" class="verify-icon loading">⏳</div>
        <div id="status-message" class="verify-status loading">
          <span class="spinner"></span>Verifying your email address...
        </div>
      </div>
      
      <a href="login.html" class="back-link">← Back to Login</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Parse URL hash parameters
    function parseHashParams() {
      const hash = window.location.hash.substring(1);
      const params = {};
      
      if (hash) {
        hash.split('&').forEach(param => {
          const [key, value] = param.split('=');
          if (key && value) {
            params[decodeURIComponent(key)] = decodeURIComponent(value);
          }
        });
      }
      
      return params;
    }

    // Parse URL search parameters
    function parseSearchParams() {
      const params = {};
      const urlParams = new URLSearchParams(window.location.search);
      for (const [key, value] of urlParams.entries()) {
        params[key] = value;
      }
      return params;
    }

    // Initialize on page load
    async function init() {
      const hashParams = parseHashParams();
      const searchParams = parseSearchParams();
      const statusIcon = document.getElementById('status-icon');
      const statusMessage = document.getElementById('status-message');
      
      // Check for errors first
      if (hashParams.error || searchParams.error) {
        const error = hashParams.error || searchParams.error;
        const errorCode = hashParams.error_code || searchParams.error_code;
        const errorDesc = hashParams.error_description || searchParams.error_description;
        
        statusIcon.className = 'verify-icon error';
        statusIcon.textContent = '❌';
        statusMessage.className = 'verify-status error';
        
        if (errorCode === 'token_expired') {
          statusMessage.textContent = 'This verification link has expired. Please request a new verification email.';
        } else if (error === 'access_denied') {
          statusMessage.textContent = 'Access denied. The verification link may be invalid or expired.';
        } else {
          statusMessage.textContent = `Error: ${errorDesc || error}`;
        }
        return;
      }
      
      // Check for access token (email verification success)
      if (hashParams.access_token) {
        try {
          // Set the session with the tokens
          const { data, error } = await sb.auth.setSession({
            access_token: hashParams.access_token,
            refresh_token: hashParams.refresh_token
          });
          
          if (error) {
            throw error;
          }
          
          // Successfully verified
          statusIcon.className = 'verify-icon success';
          statusIcon.textContent = '✓';
          statusMessage.className = 'verify-status success';
          statusMessage.textContent = 'Email verified successfully! You can now log in to your account.';
          
          // Redirect after a short delay
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
          
        } catch (error) {
          statusIcon.className = 'verify-icon error';
          statusIcon.textContent = '❌';
          statusMessage.className = 'verify-status error';
          statusMessage.textContent = `Error: ${error.message || 'Failed to verify email'}`;
        }
        return;
      }
      
      // Check for token in URL (type=signup or type=email)
      const token = hashParams.token || searchParams.token;
      const type = hashParams.type || searchParams.type;
      
      if (token && (type === 'signup' || type === 'email' || type === 'email_change')) {
        try {
          // Verify the email with the token
          const { data, error } = await sb.auth.verifyOtp({
            token_hash: token,
            type: type
          });
          
          if (error) {
            throw error;
          }
          
          // Successfully verified
          statusIcon.className = 'verify-icon success';
          statusIcon.textContent = '✓';
          statusMessage.className = 'verify-status success';
          statusMessage.textContent = 'Email verified successfully! You can now log in to your account.';
          
          // Redirect after a short delay
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
          
        } catch (error) {
          statusIcon.className = 'verify-icon error';
          statusIcon.textContent = '❌';
          statusMessage.className = 'verify-status error';
          
          if (error.message.includes('expired')) {
            statusMessage.textContent = 'This verification link has expired. Please request a new verification email.';
          } else {
            statusMessage.textContent = `Error: ${error.message || 'Failed to verify email'}`;
          }
        }
        return;
      }
      
      // Try to get session - maybe already verified
      try {
        const { data: { session }, error } = await sb.auth.getSession();
        if (session && session.user) {
          if (session.user.email_confirmed_at) {
            statusIcon.className = 'verify-icon success';
            statusIcon.textContent = '✓';
            statusMessage.className = 'verify-status success';
            statusMessage.textContent = 'Your email is already verified.';
            
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);
            return;
          }
        }
      } catch (error) {
        // Ignore session check errors
      }
      
      // No valid parameters found
      statusIcon.className = 'verify-icon error';
      statusIcon.textContent = '❌';
      statusMessage.className = 'verify-status error';
      statusMessage.textContent = 'Invalid verification link. Please check your email and use the link provided, or request a new verification email.';
    }

    // Initialize on page load
    init();
  </script>
</body>
