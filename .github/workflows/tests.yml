name: Tests & Quality

# Correctness checks: backend typecheck + unit tests, frontend inline-script
# syntax, and Discord-bot syntax + lint. (Security-specific checks —
# dependency audit, secret hygiene, CodeQL — live in security.yml.)
on:
  push:
    branches: [main, dev-beta]
  pull_request:
    branches: [main, dev-beta]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (typecheck · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backends/node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backends/node/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npx vitest run

  frontend:
    name: Frontend (inline script syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Parse classic inline <script> blocks
        run: |
          node -e '
            const fs = require("fs");
            const files = fs.readdirSync(".").filter((f) => f.endsWith(".html"));
            // Only classic scripts (skip src= externals and type= module/json/template).
            const re = /<script(?![^>]*\b(?:src|type)=)[^>]*>([\s\S]*?)<\/script>/gi;
            let bad = 0;
            for (const f of files) {
              const html = fs.readFileSync(f, "utf8");
              let m;
              while ((m = re.exec(html))) {
                try { new Function(m[1]); }
                catch (e) { bad++; console.log(`::error file=${f}::inline script: ${e.message}`); }
              }
            }
            if (bad) { console.log(`${bad} inline script(s) failed to parse`); process.exit(1); }
            console.log("all classic inline scripts parse OK");
          '

  bot:
    name: Discord bot (syntax + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Syntax check (py_compile)
        run: python -m py_compile discord-bot/*.py
      - name: Lint (ruff — informational, never blocks)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check discord-bot --output-format=github
