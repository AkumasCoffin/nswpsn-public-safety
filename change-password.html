  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background: #020617;
      background:
        radial-gradient(circle at top left, #111827 0, #020617 52%),
        radial-gradient(circle at bottom right, #020617 0, #020617 65%);
      background-attachment: fixed;
    }
    
    .change-container {
      width: 100%;
      max-width: 420px;
    }
    
    .change-card {
      background: #1e293b;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      padding: 2.5rem;
    }
    
    .change-title {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .change-title span {
      color: #f97316;
    }
    
    .change-subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    
    .change-group {
      margin-bottom: 1.2rem;
    }
    
    .change-label {
      display: block;
      color: #cbd5e1;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    
    .change-input {
      width: 100%;
      padding: 0.75rem;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
      font-family: inherit;
    }
    
    .change-input:focus {
      outline: none;
      border-color: #f97316;
    }
    
    .change-btn {
      width: 100%;
      padding: 0.8rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
      margin-top: 1rem;
      transition: background 0.2s;
      font-family: inherit;
    }
    
    .change-btn:hover:not(:disabled) {
      background: #ea580c;
    }
    
    .change-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .change-message {
      font-size: 0.85rem;
      margin-top: 1.2rem;
      text-align: center;
      min-height: 1.2em;
      padding: 0.75rem;
      border-radius: 8px;
    }
    
    .change-message:empty {
      display: none;
    }
    
    .change-message.error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .change-message.success {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    
    .change-message.info {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    
    .change-status {
      text-align: center;
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    
    .change-status.loading {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
    }
    
    .change-status.error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .user-info {
      text-align: center;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    
    .user-info-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    
    .user-info-email {
      font-size: 0.9rem;
      color: #22c55e;
      font-weight: 500;
      word-break: break-all;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #94a3b8;
      font-size: 0.85rem;
      text-decoration: none;
    }
    
    .back-link:hover {
      color: #f97316;
      text-decoration: underline;
    }
  </style>

<body>
  <div class="change-container">
    <div class="change-card">
      <div class="change-title">Change <span>Password</span></div>
      <div class="change-subtitle" id="change-subtitle">Update your account password</div>
      
      <div id="force-change-notice" style="display: none; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; background: rgba(249, 115, 22, 0.15); border: 1px solid rgba(249, 115, 22, 0.3); color: #fb923c; font-size: 0.85rem; text-align: center;">
        <i class="fas fa-exclamation-triangle" style="margin-right: 0.5rem;"></i>
        You must change your password before continuing.
      </div>
      
      <div id="status-message" class="change-status loading">Checking authentication...</div>
      
      <div id="user-info" class="user-info" style="display: none;">
        <div class="user-info-label">Logged in as</div>
        <div class="user-info-email" id="user-email"></div>
      </div>
      
      <div id="change-form" style="display: none;">
        <div class="change-group">
          <label class="change-label" for="old-password">Current Password</label>
          <input type="password" id="old-password" class="change-input" placeholder="Enter current password" required>
        </div>
        <div class="change-group">
          <label class="change-label" for="new-password">New Password</label>
          <input type="password" id="new-password" class="change-input" placeholder="Enter new password" minlength="6" required>
        </div>
        <div class="change-group">
          <label class="change-label" for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" class="change-input" placeholder="Confirm new password" minlength="6" required>
        </div>
        <button class="change-btn" id="change-btn" onclick="handlePasswordChange()">Update Password</button>
        <div id="change-message" class="change-message"></div>
      </div>
      
      <a href="#" class="back-link" id="back-link" onclick="goBack(); return false;">← Go Back</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let isForceChange = false;

    // Go back to previous page or default to map.html
    function goBack() {
      // Check if there's a referrer from the same origin
      if (document.referrer && document.referrer.includes(window.location.origin)) {
        history.back();
      } else {
        window.location.href = 'map.html';
      }
    }

    // Initialize on page load
    async function init() {
      const statusEl = document.getElementById('status-message');
      const formEl = document.getElementById('change-form');
      const userInfoEl = document.getElementById('user-info');
      const userEmailEl = document.getElementById('user-email');
      const forceNotice = document.getElementById('force-change-notice');
      const backLink = document.querySelector('.back-link');
      
      try {
        const { data: { session }, error } = await sb.auth.getSession();
        
        if (error) {
          throw error;
        }
        
        if (!session) {
          statusEl.className = 'change-status error';
          statusEl.textContent = 'You must be logged in to change your password.';
          statusEl.innerHTML += '<br><br><a href="login.html" style="color: #f97316;">Go to login →</a>';
          return;
        }
        
        // User is authenticated
        currentUser = session.user;
        
        // Check if this is a forced password change
        if (currentUser.user_metadata?.force_password_change) {
          isForceChange = true;
          forceNotice.style.display = 'block';
          if (backLink) backLink.style.display = 'none';
          document.getElementById('change-subtitle').textContent = 'First login - please set a new password';
        }
        
        statusEl.style.display = 'none';
        userInfoEl.style.display = 'block';
        userEmailEl.textContent = currentUser.email;
        formEl.style.display = 'block';
        
      } catch (error) {
        statusEl.className = 'change-status error';
        statusEl.textContent = `Error: ${error.message || 'Failed to check authentication'}`;
      }
    }

    // Handle password change
    async function handlePasswordChange() {
      const oldPassword = document.getElementById('old-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageEl = document.getElementById('change-message');
      const btn = document.getElementById('change-btn');
      
      // Clear previous messages
      messageEl.textContent = '';
      messageEl.className = 'change-message';
      
      // Validate inputs
      if (!oldPassword) {
        messageEl.className = 'change-message error';
        messageEl.textContent = 'Please enter your current password.';
        return;
      }
      
      if (!newPassword || newPassword.length < 6) {
        messageEl.className = 'change-message error';
        messageEl.textContent = 'New password must be at least 6 characters long.';
        return;
      }
      
      if (newPassword !== confirmPassword) {
        messageEl.className = 'change-message error';
        messageEl.textContent = 'New passwords do not match.';
        return;
      }
      
      if (oldPassword === newPassword) {
        messageEl.className = 'change-message error';
        messageEl.textContent = 'New password must be different from current password.';
        return;
      }
      
      // Disable button
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      messageEl.className = 'change-message info';
      messageEl.textContent = 'Verifying current password...';
      
      try {
        // First, verify old password by attempting to sign in
        const { error: signInError } = await sb.auth.signInWithPassword({
          email: currentUser.email,
          password: oldPassword
        });
        
        if (signInError) {
          messageEl.className = 'change-message error';
          messageEl.textContent = 'Current password is incorrect.';
          btn.disabled = false;
          btn.textContent = 'Update Password';
          return;
        }
        
        // Update password and clear force_password_change flag
        messageEl.textContent = 'Updating password...';
        btn.textContent = 'Updating...';
        
        const { error: updateError } = await sb.auth.updateUser({
          password: newPassword,
          data: { force_password_change: false }
        });
        
        if (updateError) {
          throw updateError;
        }
        
        // Success
        messageEl.className = 'change-message success';
        messageEl.textContent = 'Password updated successfully! Redirecting...';
        
        // Clear form
        document.getElementById('old-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        
        // Redirect after a short delay
        setTimeout(() => {
          window.location.href = 'map-editor.html';
        }, 2000);
        
      } catch (error) {
        messageEl.className = 'change-message error';
        messageEl.textContent = `Error: ${error.message || 'Failed to update password'}`;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }

    // Allow Enter key to submit from last field
    document.getElementById('confirm-password')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handlePasswordChange();
      }
    });

    // Initialize on page load
    init();
  </script>
</body>
</html>
