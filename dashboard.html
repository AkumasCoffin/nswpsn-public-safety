    el('span', { style: 'color:var(--text-muted)' }, `Effective: ${effectiveGlyphTitle(eff)}`),
    ...effCaption,
  ]);
  wrap.appendChild(summary);

  // -------- Alert types (chips) --------
  wrap.appendChild(el('div', { class: 'section-label' }, [
    el('span', { class: 'cap' }, 'Alert types'),
    el('span', { class: 'inherit-note' }, `${(preset.alert_types||[]).length} selected`),
  ]));
  wrap.appendChild(renderAlertTypeChips(preset));

  // -------- Pager --------
  wrap.appendChild(el('div', { class: 'section-label' }, 'Pager'));
  wrap.appendChild(renderPagerCard(preset));

  // -------- Roles to ping --------
  wrap.appendChild(el('div', { class: 'section-label' }, [
    el('span', { class: 'cap' }, 'Roles to ping'),
    el('span', { class: 'inherit-note' }, `${(preset.role_ids||[]).length} / ${MAX_ROLES}`),
  ]));
  wrap.appendChild(renderRolesCard(preset));

  // -------- Filters (optional) --------
  wrap.appendChild(el('div', { class: 'section-label' }, [
    el('span', { class: 'cap' }, 'Filters (optional)'),
    el('span', { class: 'inherit-note' }, filtersSummary(preset)),
  ]));
  wrap.appendChild(renderFiltersCard(preset));

  // -------- Preset mute --------
  wrap.appendChild(el('div', { class: 'section-label' }, 'Mute'));
  wrap.appendChild(renderPresetMuteCard(preset));

  // -------- Per-type overrides --------
  if ((preset.alert_types||[]).length > 0) {
    wrap.appendChild(el('div', { class: 'section-label' }, [
      el('span', { class: 'cap' }, 'Per-type overrides'),
      el('span', { class: 'inherit-note' }, 'Fine-tune individual alert types'),
    ]));
    wrap.appendChild(renderOverridesCard(preset));
  }

  return wrap;
}

function inheritanceCaption(preset) {
  const out = [];
  const g = state.muteState.guild;
  const c = channelMute(preset.channel_id);
  if (!g.enabled) out.push(el('span', { class: 'pill muted' }, 'guild muted'));
  else if (!g.enabled_ping) out.push(el('span', { class: 'pill pings-off' }, 'guild pings off'));
  if (!c.enabled) out.push(el('span', { class: 'pill muted' }, 'channel muted'));
  else if (!c.enabled_ping) out.push(el('span', { class: 'pill pings-off' }, 'channel pings off'));
  if (!preset.enabled) out.push(el('span', { class: 'pill muted' }, 'preset muted'));
  else if (!preset.enabled_ping) out.push(el('span', { class: 'pill pings-off' }, 'preset pings off'));
  return out;
}

// Per-preset provider expand/collapse state. Keyed by `${presetId}:${providerKey}`.
// Sections are collapsed by default; toggled-open state survives re-renders within
// the same dashboard session but isn't persisted (cheap to re-derive from selection).
const _providerOpen = new Map();
function _providerKey(presetId, providerKey) { return `${presetId}:${providerKey}`; }
function isProviderOpen(presetId, providerKey, hasSelected) {
  const k = _providerKey(presetId, providerKey);
  if (_providerOpen.has(k)) return _providerOpen.get(k);
  // Default: open when any of this provider's types is selected on this preset.
  return !!hasSelected;
}
function setProviderOpen(presetId, providerKey, open) {
  _providerOpen.set(_providerKey(presetId, providerKey), !!open);
}

function _renderProviderSection(provider, selected, opts) {
  // opts: { onToggleType(typeKey), onSelectAll(), presetId, expanded, onExpand(open) }
  const types = provider.types || [];
  const selectedCount = types.filter(t => selected.has(t.key)).length;
  const totalCount = types.length;
  const hasSelected = selectedCount > 0;
  const expanded = !!opts.expanded;

  const section = el('div', {
    class: 'provider-section' + (expanded ? ' expanded' : ''),
  });
  const header = el('button', {
    class: 'provider-header',
    type: 'button',
    'aria-expanded': expanded ? 'true' : 'false',
    onclick: () => opts.onExpand(!expanded),
  }, [
    el('span', { class: 'pv-icon' },
      el('i', { class: `fa-solid fa-${provider.icon || 'circle'}`,
                style: `color:${provider.color || '#94a3b8'}` })),
    el('span', { class: 'pv-name' }, provider.name),
    el('span', { class: 'pv-count' + (hasSelected ? ' has-selected' : '') },
      `${selectedCount}/${totalCount}`),
    el('i', { class: 'fa-solid fa-chevron-right pv-caret' }),
  ]);
  section.appendChild(header);

  if (expanded) {
    const body = el('div', { class: 'provider-body' });
    // Toolbar: Select all / Clear (per provider).
    const allSelected = selectedCount === totalCount && totalCount > 0;
    body.appendChild(el('div', { class: 'provider-toolbar' }, [
      el('button', {
        class: 'link-btn',
        onclick: (e) => { e.stopPropagation(); opts.onSelectAll(!allSelected); },
      }, allSelected ? 'Clear all' : 'Select all'),
    ]));
    // Chips — show only the human label. Provider context is already in
    // the section header, so prefixing with the source (e.g. waze_hazard)
    // is redundant. Canonical key kept on the title attribute for hover
    // tooltips / quick debug.
    const row = el('div', { class: 'chip-row' });
    for (const t of types) {
      const active = selected.has(t.key);
      row.appendChild(el('button', {
        class: 'chip' + (active ? ' active' : ''),
        onclick: (e) => { e.stopPropagation(); opts.onToggleType(t.key); },
        title: t.key,
        type: 'button',
      }, t.label || ALERT_TYPE_LABELS[t.key] || t.key));
    }
    body.appendChild(row);
    section.appendChild(body);
  }
  return section;
}

function renderAlertTypeChips(preset) {
  const selected = new Set(preset.alert_types || []);
  const wrap = el('div', { class: 'provider-list' });
  for (const provider of PROVIDERS) {
    const hasSelected = provider.types.some(t => selected.has(t.key));
    const expanded = isProviderOpen(preset.id, provider.key, hasSelected);
    wrap.appendChild(_renderProviderSection(provider, selected, {
      presetId: preset.id,
      expanded,
      onExpand: (open) => {
        setProviderOpen(preset.id, provider.key, open);
        // Replace this section in-place to keep editor scroll position.
        render();
      },
      onToggleType: (typeKey) => toggleAlertType(preset.id, typeKey),
      onSelectAll: (turnOn) => {
        // Compute the next alert_types array off the current preset state.
        const cur = new Set(preset.alert_types || []);
        for (const t of provider.types) {
          if (turnOn) cur.add(t.key); else cur.delete(t.key);
        }
        patchPreset(preset.id, { alert_types: Array.from(cur) });
      },
    }));
  }
  return wrap;
}

function renderPagerCard(preset) {
  const card = el('div', { class: 'card' });
  const row = el('div', { class: 'card-row' }, [
    el('span', { class: 'label' }, [
      el('span', {}, 'Pager messages'),
      el('span', { class: 'sub' }, 'Subscribe to pager/capcode-based alerts.'),
    ]),
    makeSwitch(!!preset.pager_enabled, (checked) => patchPreset(preset.id, { pager_enabled: checked }), 'Pager enabled'),
  ]);
  card.appendChild(row);

  if (preset.pager_enabled) {
    const caps = preset.pager_capcodes || '';
    const ta = el('textarea', {
      class: 'form-textarea',
      placeholder: 'e.g. 1234567, 2345678, 3456789',
      id: 'capcodes-' + preset.id,
    });
    ta.value = caps;
    let dirty = false;
    ta.addEventListener('input', () => { dirty = true; });
    ta.addEventListener('blur', () => {
      if (!dirty) return;
      dirty = false;
      const v = ta.value.trim();
      if (v === (preset.pager_capcodes || '')) return;
      patchPreset(preset.id, { pager_capcodes: v || null });
    });
    card.appendChild(el('div', { class: 'pager-capcodes' }, [
      el('label', { for: ta.id }, 'Capcodes (comma-separated)'),
      ta,
    ]));
  }

  return card;
}

function renderRolesCard(preset) {
  const roleIds = parseRoleIds(preset.role_ids);
  const display = el('div', { class: 'role-display' });
  if (roleIds.length === 0) {
    display.appendChild(el('span', { class: 'none' }, 'No roles configured — alerts will post without pings.'));
  } else {
    for (const id of roleIds) {
      const role = state.roles.find(r => String(r.id) === String(id));
      const name = role ? role.name : id;
      const color = role && role.color ? discordColorToHex(role.color) : '#c7d2fe';
      display.appendChild(el('span', { class: 'role-pill' }, [
        el('span', { class: 'dot', style: `background:${color}` }),
        '@' + name,
      ]));
    }
  }
  display.appendChild(el('button', {
    class: 'roles-edit',
    onclick: () => openRoleModal(preset.id),
  }, [el('i', { class: 'fa-solid fa-pen' }), ' Edit']));

  return el('div', { class: 'card' }, el('div', { class: 'card-row' }, display));
}

// ============================================================================
// Filters (per-preset keyword / severity floor / geofilter shape).
// Persisted on PATCH /presets/<id> as `filters` JSONB. Empty/missing means
// "no filter" — every alert that passes the mute gate is delivered.
// ============================================================================

// Per-alert-type severity scales. The dashboard renders one dropdown per
// severity-aware alert type so users can set independent floors for each.
const _DASH_SEVERITY_PER_TYPE = {
  rfs: [
    { value: 'advice',        label: 'Advice' },
    { value: 'watch_and_act', label: 'Watch & Act' },
    { value: 'emergency',     label: 'Emergency' },
  ],
  bom_land: [
    { value: 'minor',    label: 'Minor' },
    { value: 'moderate', label: 'Moderate' },
    { value: 'major',    label: 'Major' },
  ],
  bom_marine: [
    { value: 'minor',    label: 'Minor' },
    { value: 'moderate', label: 'Moderate' },
    { value: 'major',    label: 'Major' },
  ],
  traffic_majorevent: [
    { value: 'minor',    label: 'Minor' },
    { value: 'moderate', label: 'Moderate' },
    { value: 'major',    label: 'Major' },
  ],
};
const _DASH_SEVERITY_TYPE_LABELS = {
  rfs:                'RFS (bushfires)',
  bom_land:           'BOM Land (weather)',
  bom_marine:         'BOM Marine (weather)',
  traffic_majorevent: 'Traffic (major events)',
};
const _DASH_FILTER_SEVERITY_TYPES = new Set(Object.keys(_DASH_SEVERITY_PER_TYPE));

// Canonical alert_types that carry a meaningful sub-type field. Mirrors
// _DASH_SUBTYPE_AWARE_TYPES on the backend. Only these show subtype-filter
// rows in the filters card.
const _DASH_SUBTYPE_AWARE_TYPES = new Set([
  'rfs',
  'bom_land', 'bom_marine',
  'traffic_incident', 'traffic_roadwork', 'traffic_flood',
  'traffic_fire', 'traffic_majorevent',
  'waze_hazard', 'waze_jam', 'waze_police', 'waze_roadwork',
  'user_incident',
]);

// Lazy-fetched + cached `/api/data/history/filters` providers tree.
// First call kicks off a request; subsequent calls reuse the same promise.
// Used to populate the subtype filter chip lists with whatever values
// have actually been observed in data_history.
//
// NOTE: deliberately bypasses api() — that helper sends `credentials:
// 'include'` for the dashboard session cookie, but the filter endpoint
// returns `Access-Control-Allow-Origin: *`, which browsers refuse to
// combine with credentialled requests. The endpoint is public; no cookie
// needed.
let _dashFilterFetchPromise = null;
function fetchFilterCatalogue() {
  if (_dashFilterFetchPromise) return _dashFilterFetchPromise;
  _dashFilterFetchPromise = fetch(API + '/api/data/history/filters')
    .then(r => r.ok ? r.json() : { providers: [] })
    .catch(() => ({ providers: [] }));
  return _dashFilterFetchPromise;
}

// Given the catalogue + a canonical alert_type, return a deduped sorted
// array of subtype values (drawing from both `categories` and `subcategories`
// of the matching provider type).
function subtypeOptionsFor(catalogue, alertType) {
  if (!catalogue || !Array.isArray(catalogue.providers)) return [];
  const seen = new Map();   // value -> count (for sort)
  for (const p of catalogue.providers) {
    for (const t of (p.types || [])) {
      if (t.alert_type !== alertType) continue;
      for (const list of [t.categories, t.subcategories]) {
        if (!Array.isArray(list)) continue;
        for (const e of list) {
          if (!e || typeof e.value !== 'string' || !e.value) continue;
          seen.set(e.value, (seen.get(e.value) || 0) + (Number(e.count) || 0));
        }
      }
    }
  }
  // Sort by count desc, then alphabetically.
  return Array.from(seen.entries())
    .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]))
    .map(([v]) => v);
}

function presetFilters(preset) {
  const f = (preset && preset.filters) || {};
  // Geofilter: prefer the new `geofilter` key. Legacy presets stored a
  // top-level `bbox` — treat that as type:'bbox' so old configs keep working
  // until they're re-saved via the dashboard.
  let gf = null;
  if (f.geofilter && typeof f.geofilter === 'object' && f.geofilter.type) {
    gf = f.geofilter;
  } else if (f.bbox && typeof f.bbox === 'object' && typeof f.bbox.lat_min === 'number') {
    gf = { type: 'bbox', ...f.bbox };
  }
  // Severity: prefer per-type dict. Legacy single string is fanned out to
  // whichever per-type scales contain that token, so legacy presets render
  // identical floors across the affected dropdowns.
  let sev = {};
  const rawSev = f.severity_min;
  if (typeof rawSev === 'string' && rawSev) {
    for (const at of Object.keys(_DASH_SEVERITY_PER_TYPE)) {
      if (_DASH_SEVERITY_PER_TYPE[at].some(o => o.value === rawSev)) {
        sev[at] = rawSev;
      }
    }
  } else if (rawSev && typeof rawSev === 'object') {
    for (const [at, v] of Object.entries(rawSev)) {
      if (typeof v === 'string' && v) sev[at] = v;
    }
  }
  // Subtype filters: per-alert-type whitelist of sub-classifications.
  // Empty / missing dict means no filter.
  let subtypeFilters = {};
  const rawSf = f.subtype_filters;
  if (rawSf && typeof rawSf === 'object') {
    for (const [at, list] of Object.entries(rawSf)) {
      if (Array.isArray(list)) {
        const cleaned = list.filter(v => typeof v === 'string' && v);
        if (cleaned.length) subtypeFilters[at] = cleaned;
      }
    }
  }
  return {
    keywords_include: Array.isArray(f.keywords_include) ? f.keywords_include : [],
    keywords_exclude: Array.isArray(f.keywords_exclude) ? f.keywords_exclude : [],
    severity_min: sev,
    subtype_filters: subtypeFilters,
    geofilter: gf,
  };
}

function filtersSummary(preset) {
  const f = presetFilters(preset);
  const bits = [];
  const kw = f.keywords_include.length + f.keywords_exclude.length;
  if (kw) bits.push(`${kw} keyword${kw === 1 ? '' : 's'}`);
  const nSev = Object.keys(f.severity_min).length;
  if (nSev) bits.push(`severity (${nSev} source${nSev === 1 ? '' : 's'})`);
  const nSub = Object.keys(f.subtype_filters).length;
  if (nSub) bits.push(`subtypes (${nSub} source${nSub === 1 ? '' : 's'})`);
  if (f.geofilter) {
    const t = f.geofilter.type;
    bits.push(t === 'ring' ? 'circle' : (t === 'polygon' ? 'polygon' : 'square'));
  }
  return bits.length ? `Filters: ${bits.join(', ')}` : 'Filters: off';
}

/* Interactive geofilter picker — Leaflet map with three shape modes.
   Returns { dom, get(), set(geofilter), invalidate() }.
   Modes:
   - bbox    — click+drag to draw a rectangle (or "Use map view" to snap to viewport).
   - ring    — click center, drag to set radius, release to commit.
   - polygon — click to add vertices (3+); "Finish" commits.
*/
function makeGeofilterMap(preset, initialGeofilter) {
  const mapId = 'bbox-map-' + preset.id + '-' + Math.random().toString(36).slice(2, 7);
  const hint = el('div', { class: 'bbox-map-hint' }, '');
  const mapDiv = el('div', { class: 'bbox-map', id: mapId }, [hint]);
  const coords = el('div', { class: 'bbox-coords' });

  const modeSelect = el('select', { class: 'form-select', style: 'max-width:170px;flex:0 0 auto;' });
  for (const [v, label] of [
    ['bbox',    'Square (bbox)'],
    ['ring',    'Circle / radius'],
    ['polygon', 'Polygon'],
  ]) modeSelect.appendChild(el('option', { value: v }, label));

  const drawBtn    = el('button', { class: 'btn btn-ghost btn-sm' },
    [el('i', { class: 'fa-solid fa-vector-square' }), ' Draw']);
  const useViewBtn = el('button', { class: 'btn btn-ghost btn-sm' },
    [el('i', { class: 'fa-solid fa-expand' }), ' Use view']);
  const finishBtn  = el('button', { class: 'btn btn-ghost btn-sm' },
    [el('i', { class: 'fa-solid fa-check' }), ' Finish']);
  const clearBtn   = el('button', { class: 'btn btn-ghost btn-sm' },
    [el('i', { class: 'fa-solid fa-eraser' }), ' Clear']);
  const actions = el('div', { class: 'bbox-map-actions' }, [
    modeSelect, drawBtn, useViewBtn, finishBtn, clearBtn,
  ]);
  const wrap = el('div', {}, [mapDiv, coords, actions]);

  // ---- State ----
  let map = null;
  let layer = null;             // committed shape (rect / circle / polygon)
  let previewLayer = null;      // live drawing preview
  let polyMarkers = [];         // vertex markers during polygon edit
  let drawMode = false;
  let startLatLng = null;       // drag start (bbox + ring)
  let polyPoints = [];          // working vertex list (polygon)
  let mode = 'bbox';
  let current = null;           // canonical geofilter object or null
  let ctrlPanActive = false;    // hold Ctrl in draw mode → temporarily pan instead of draw

  // Initial value — accept either new geofilter shape or legacy bbox.
  if (initialGeofilter && typeof initialGeofilter === 'object') {
    if (initialGeofilter.type) {
      current = JSON.parse(JSON.stringify(initialGeofilter));
      mode = current.type;
    } else if (typeof initialGeofilter.lat_min === 'number') {
      current = { type: 'bbox', ...initialGeofilter };
      mode = 'bbox';
    }
  }
  modeSelect.value = mode;

  // ---- Rendering ----
  function clearPreview() {
    if (previewLayer && map) { map.removeLayer(previewLayer); }
    previewLayer = null;
  }
  function clearPolyMarkers() {
    if (map) for (const m of polyMarkers) map.removeLayer(m);
    polyMarkers = [];
  }
  function clearLayer() {
    if (layer && map) { map.removeLayer(layer); layer = null; }
  }
  const SHAPE_STYLE = { color: '#f97316', weight: 2, fillOpacity: 0.15 };

  function renderShape() {
    if (!map) return;
    clearLayer();
    if (!current) return;
    if (current.type === 'bbox') {
      layer = L.rectangle(
        [[current.lat_min, current.lng_min], [current.lat_max, current.lng_max]],
        SHAPE_STYLE).addTo(map);
    } else if (current.type === 'ring') {
      layer = L.circle([current.lat, current.lng],
        { ...SHAPE_STYLE, radius: current.radius_m }).addTo(map);
    } else if (current.type === 'polygon') {
      layer = L.polygon(current.points.map(p => [p[0], p[1]]),
        SHAPE_STYLE).addTo(map);
    }
  }

  function fmtCoord(n) { return Number(n).toFixed(4); }
  function fmtRadius(m) {
    return m >= 1000 ? `${(m / 1000).toFixed(2)} km` : `${Math.round(m)} m`;
  }

  function renderCoords() {
    coords.innerHTML = '';
    if (!current) {
      coords.appendChild(el('span', { class: 'none' },
        'No geofilter — alerts from anywhere will pass.'));
      return;
    }
    if (current.type === 'bbox') {
      coords.appendChild(document.createTextNode(
        `bbox: ${fmtCoord(current.lat_min)}, ${fmtCoord(current.lng_min)}  →  ${fmtCoord(current.lat_max)}, ${fmtCoord(current.lng_max)}`));
    } else if (current.type === 'ring') {
      coords.appendChild(document.createTextNode(
        `circle: center ${fmtCoord(current.lat)}, ${fmtCoord(current.lng)} · radius ${fmtRadius(current.radius_m)}`));
    } else if (current.type === 'polygon') {
      coords.appendChild(document.createTextNode(
        `polygon: ${current.points.length} vertices`));
    }
  }

  // ---- Hint text per mode ----
  const HINTS = {
    bbox:    'Click "Draw", then click-and-drag to define a rectangle.',
    ring:    'Click "Draw", then click the center and drag outward to set radius.',
    polygon: 'Click "Draw", then click on the map to add vertices. "Finish" commits.',
  };
  function refreshHint() {
    if (drawMode) {
      if (ctrlPanActive) {
        hint.textContent = 'Pan mode (Ctrl) — release Ctrl to resume drawing.';
      } else {
        const base = (mode === 'bbox')    ? 'Click and drag to draw the rectangle.'
                   : (mode === 'ring')    ? 'Click the center and drag outward.'
                   :                       'Click to add vertices. "Finish" when done.';
        hint.textContent = base + ' (Hold Ctrl to pan)';
      }
    } else {
      hint.textContent = HINTS[mode] || '';
    }
    hint.classList.toggle('hidden', !!current && !drawMode);
  }

  function refreshActionVisibility() {
    drawBtn.style.display    = (mode === 'polygon' && drawMode) ? 'none' : '';
    useViewBtn.style.display = (mode === 'bbox') ? '' : 'none';
    finishBtn.style.display  = (mode === 'polygon' && drawMode) ? '' : 'none';
  }

  // ---- Draw mode ----
  function enterDrawMode() {
    if (!map || drawMode) return;
    drawMode = true;
    mapDiv.classList.add('drawing');
    map.dragging.disable();
    drawBtn.disabled = true;
    if (mode === 'polygon') {
      polyPoints = [];
      clearPolyMarkers();
      clearPreview();
    }
    refreshHint();
    refreshActionVisibility();
  }
  function exitDrawMode() {
    drawMode = false;
    startLatLng = null;
    mapDiv.classList.remove('drawing');
    mapDiv.classList.remove('panning');
    ctrlPanActive = false;
    if (map) map.dragging.enable();
    drawBtn.disabled = false;
    clearPreview();
    refreshHint();
    refreshActionVisibility();
  }
  // Hold Ctrl (or Cmd on macOS) while in draw mode to temporarily pan the
  // map without leaving the chosen shape mode. Releasing Ctrl re-enters draw.
  function setCtrlPan(on) {
    if (!map || !drawMode) return;
    if (on === ctrlPanActive) return;
    ctrlPanActive = on;
    if (on) {
      map.dragging.enable();
      mapDiv.classList.remove('drawing');
      mapDiv.classList.add('panning');
    } else {
      map.dragging.disable();
      mapDiv.classList.remove('panning');
      mapDiv.classList.add('drawing');
    }
    refreshHint();
  }

  // ---- Mode switch ----
  modeSelect.onchange = () => {
    const newMode = modeSelect.value;
    if (newMode === mode) return;
    mode = newMode;
    // Switching modes drops any in-progress draw and any committed shape of
    // the wrong type. Existing shape of the same type stays.
    if (drawMode) exitDrawMode();
    if (current && current.type !== mode) {
      current = null;
      clearLayer();
    }
    clearPolyMarkers();
    polyPoints = [];
    refreshHint();
    refreshActionVisibility();
    renderCoords();
  };

  // ---- Polygon helpers ----
  function commitPolygon() {
    if (polyPoints.length < 3) {
      alert('Polygon needs at least 3 vertices.');
      return;
    }
    current = { type: 'polygon', points: polyPoints.map(p => [p.lat, p.lng]) };
    polyPoints = [];
    clearPolyMarkers();
    exitDrawMode();
    renderShape();
    renderCoords();
  }
  function redrawPolyPreview() {
    clearPreview();
    if (polyPoints.length >= 2 && map) {
      previewLayer = L.polyline(polyPoints.map(p => [p.lat, p.lng]),
        { color: '#f97316', weight: 2, dashArray: '4 4' }).addTo(map);
    }
  }

  // ---- Init ----
  function init(retries = 50) {
    if (typeof L === 'undefined' || !document.body.contains(mapDiv)) {
      if (retries > 0) setTimeout(() => init(retries - 1), 60);
      return;
    }
    map = L.map(mapId, { attributionControl: false, zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);
    L.control.attribution({ position: 'bottomright', prefix: false }).addTo(map);

    if (current) {
      renderShape();
      try {
        if (current.type === 'bbox') {
          map.fitBounds([
            [current.lat_min, current.lng_min], [current.lat_max, current.lng_max],
          ], { padding: [20, 20], maxZoom: 11 });
        } else if (current.type === 'ring' && layer) {
          map.fitBounds(layer.getBounds(), { padding: [20, 20], maxZoom: 12 });
        } else if (current.type === 'polygon' && layer) {
          map.fitBounds(layer.getBounds(), { padding: [20, 20], maxZoom: 11 });
        }
      } catch (e) { map.setView([-33.87, 151.21], 6); }
    } else {
      map.setView([-33.87, 151.21], 6);
    }
    renderCoords();
    refreshHint();
    refreshActionVisibility();

    // Helper — true if this Leaflet event was fired with Ctrl/Cmd held.
    const evtCtrl = (e) => {
      const oe = e && e.originalEvent;
      return !!(oe && (oe.ctrlKey || oe.metaKey));
    };

    map.on('mousedown', (e) => {
      if (!drawMode) return;
      if (ctrlPanActive || evtCtrl(e)) return;  // Ctrl held → let Leaflet pan
      if (mode === 'bbox' || mode === 'ring') {
        startLatLng = e.latlng;
        clearPreview();
      }
    });
    map.on('mousemove', (e) => {
      if (!drawMode || !startLatLng) return;
      clearPreview();
      if (mode === 'bbox') {
        previewLayer = L.rectangle([startLatLng, e.latlng], SHAPE_STYLE).addTo(map);
      } else if (mode === 'ring') {
        const r = startLatLng.distanceTo(e.latlng);
        previewLayer = L.circle(startLatLng, { ...SHAPE_STYLE, radius: r }).addTo(map);
      }
    });
    map.on('mouseup', (e) => {
      if (!drawMode) return;
      if (mode === 'bbox') {
        if (!startLatLng) { exitDrawMode(); return; }
        const end = e.latlng;
        const lat_min = Math.min(startLatLng.lat, end.lat);
        const lat_max = Math.max(startLatLng.lat, end.lat);
        const lng_min = Math.min(startLatLng.lng, end.lng);
        const lng_max = Math.max(startLatLng.lng, end.lng);
        clearPreview();
        if (Math.abs(lat_max - lat_min) < 1e-5 || Math.abs(lng_max - lng_min) < 1e-5) {
          exitDrawMode(); return;
        }
        current = { type: 'bbox', lat_min, lat_max, lng_min, lng_max };
        exitDrawMode();
        renderShape();
        renderCoords();
      } else if (mode === 'ring') {
        if (!startLatLng) { exitDrawMode(); return; }
        const r = startLatLng.distanceTo(e.latlng);
        clearPreview();
        if (r < 50) {  // <50m is almost always a stray click
          exitDrawMode(); return;
        }
        current = { type: 'ring', lat: startLatLng.lat, lng: startLatLng.lng, radius_m: r };
        exitDrawMode();
        renderShape();
        renderCoords();
      }
    });
    // Polygon: click to add vertex (skip if panning via Ctrl).
    map.on('click', (e) => {
      if (!drawMode || mode !== 'polygon') return;
      if (ctrlPanActive || evtCtrl(e)) return;
      polyPoints.push(e.latlng);
      const m = L.circleMarker(e.latlng, { radius: 4, color: '#f97316', fillOpacity: 1 }).addTo(map);
      polyMarkers.push(m);
      redrawPolyPreview();
    });

    // Window-level Ctrl listeners — toggling pan-during-draw. We bind once at
    // init and gate on drawMode inside setCtrlPan so we don't have to attach
    // and detach on every enter/exit.
    const onKey = (e) => {
      const ctrl = !!(e.ctrlKey || e.metaKey);
      setCtrlPan(ctrl && drawMode);
    };
    window.addEventListener('keydown', onKey);
    window.addEventListener('keyup', onKey);
    // Reset on blur — if the user alt-tabs while holding Ctrl, the keyup
    // event won't fire and the map would be stuck in pan mode.
    window.addEventListener('blur', () => setCtrlPan(false));

    setTimeout(() => { if (map) map.invalidateSize(); }, 120);
  }
  init();

  // ---- Buttons ----
  drawBtn.onclick = (e) => {
    e.preventDefault();
    // Starting a new draw drops the existing shape of any type.
    if (current) { current = null; clearLayer(); renderCoords(); }
    enterDrawMode();
  };
  useViewBtn.onclick = (e) => {
    e.preventDefault();
    if (!map || mode !== 'bbox') return;
    const b = map.getBounds();
    current = {
      type: 'bbox',
      lat_min: b.getSouth(), lat_max: b.getNorth(),
      lng_min: b.getWest(),  lng_max: b.getEast(),
    };
    renderShape();
    renderCoords();
  };
  finishBtn.onclick = (e) => { e.preventDefault(); commitPolygon(); };
  clearBtn.onclick = (e) => {
    e.preventDefault();
    current = null;
    polyPoints = [];
    clearLayer();
    clearPreview();
    clearPolyMarkers();
    if (drawMode) exitDrawMode();
    renderCoords();
  };

  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => {
      if (!map) return;
      if (mapDiv.clientWidth > 0 && mapDiv.clientHeight > 0) {
        map.invalidateSize();
      }
    });
    ro.observe(mapDiv);
  }

  return {
    dom: wrap,
    get: () => current ? JSON.parse(JSON.stringify(current)) : null,
    set: (gf) => {
      if (gf && typeof gf === 'object' && gf.type) {
        current = JSON.parse(JSON.stringify(gf));
        mode = current.type;
        modeSelect.value = mode;
      } else if (gf && typeof gf === 'object' && typeof gf.lat_min === 'number') {
        current = { type: 'bbox', ...gf };
        mode = 'bbox';
        modeSelect.value = mode;
      } else {
        current = null;
      }
      polyPoints = [];
      clearPolyMarkers();
      renderShape();
      renderCoords();
      refreshActionVisibility();
      if (map && current && layer) {
        try { map.fitBounds(layer.getBounds(), { padding: [20, 20], maxZoom: 12 }); } catch (e) {}
      }
    },
    invalidate: () => { if (map) map.invalidateSize(); },
  };
}

function renderFiltersCard(preset) {
  const card = el('div', { class: 'card' });
  const f = presetFilters(preset);

  const hasSeverityType = (preset.alert_types || []).some(t => _DASH_FILTER_SEVERITY_TYPES.has(t));

  // Header row: summary + toggle button.
  const editorId = 'filters-editor-' + preset.id;
  let expanded = !!(f.keywords_include.length || f.keywords_exclude.length
                    || Object.keys(f.severity_min).length
                    || Object.keys(f.subtype_filters).length
                    || f.geofilter);

  const summarySpan = el('span', { class: 'filters-summary' }, filtersSummary(preset));
  const toggleBtn = el('button', {
    class: 'filters-toggle',
    onclick: () => {
      expanded = !expanded;
      const body = document.getElementById(editorId);
      if (body) body.style.display = expanded ? 'grid' : 'none';
      toggleBtn.textContent = expanded ? 'Hide' : 'Edit';
      // Leaflet can't size itself while display:none — force a re-tile as
      // soon as the container becomes visible.
      if (expanded && geofilterMap && geofilterMap.invalidate) {
        setTimeout(() => geofilterMap.invalidate(), 30);
      }
    },
  }, expanded ? 'Hide' : 'Edit');

  card.appendChild(el('div', { class: 'card-row' }, [
    el('span', { class: 'label' }, [
      el('span', {}, 'Filters'),
      el('span', { class: 'sub' }, 'Restrict this preset to alerts that match keywords, a severity floor, sub-types, or a region.'),
    ]),
    el('div', { style: 'display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap' }, [summarySpan, toggleBtn]),
  ]));

  // Editor body (hidden when collapsed).
  const body = el('div', { class: 'filters-body', id: editorId });
  body.style.display = expanded ? 'grid' : 'none';

  // ---- Keywords include ----
  const incTa = el('textarea', {
    class: 'form-textarea',
    placeholder: 'comma-separated, e.g. fire, structure, bushfire',
    id: 'filters-inc-' + preset.id,
  });
  incTa.value = f.keywords_include.join(', ');
  body.appendChild(el('div', {}, [
    el('label', { class: 'field-label', for: incTa.id }, 'Include keywords (any-of, case-insensitive)'),
    incTa,
  ]));

  // ---- Keywords exclude ----
  const excTa = el('textarea', {
    class: 'form-textarea',
    placeholder: 'comma-separated, e.g. drill, exercise, test',
    id: 'filters-exc-' + preset.id,
  });
  excTa.value = f.keywords_exclude.join(', ');
  body.appendChild(el('div', {}, [
    el('label', { class: 'field-label', for: excTa.id }, 'Exclude keywords (none-of)'),
    excTa,
  ]));

  // ---- Severity floors (one per severity-aware alert type) ----
  const presetTypes = new Set(preset.alert_types || []);
  const sevSelects = {};   // alert_type -> <select> element
  const sevWrap = el('div', {});
  sevWrap.appendChild(el('label', { class: 'field-label' }, 'Severity floors (per source)'));
  for (const at of Object.keys(_DASH_SEVERITY_PER_TYPE)) {
    const enabled = presetTypes.has(at);
    const sel = el('select', {
      class: 'form-select',
      id: `filters-sev-${at}-${preset.id}`,
    });
    sel.appendChild(el('option', { value: '' }, '(no floor)'));
    for (const opt of _DASH_SEVERITY_PER_TYPE[at]) {
      const o = el('option', { value: opt.value }, opt.label);
      if (f.severity_min[at] === opt.value) o.selected = true;
      sel.appendChild(o);
    }
    if (!enabled) {
      sel.disabled = true;
      sel.style.opacity = '0.55';
    }
    sevSelects[at] = sel;
    const labelStyle = 'min-width:160px;font-size:0.8rem;'
      + (enabled ? '' : 'color:var(--text-soft);');
    const row = el('div', {
      style: 'display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;flex-wrap:wrap;',
    }, [
      el('span', { style: labelStyle }, _DASH_SEVERITY_TYPE_LABELS[at]),
      sel,
    ]);
    sevWrap.appendChild(row);
  }
  sevWrap.appendChild(el('div', { style: 'font-size:0.7rem;color:var(--text-soft);margin-top:0.35rem' },
    hasSeverityType
      ? 'Each floor is independent — RFS at "Watch & Act" lets advice through for BOM if BOM is set lower.'
      : 'Add RFS, BOM, or traffic_major to this preset to use severity floors. Greyed-out rows are inactive.'));
  body.appendChild(sevWrap);

  // ---- Subtype filters (per subscribed subtype-aware alert type) ----
  // Rendered shell now; chip options populate asynchronously once the
  // /filters catalogue arrives. State is held in subtypeSelections map
  // keyed by alert_type → Set of selected subtype strings.
  const subtypeAware = (preset.alert_types || []).filter(t => _DASH_SUBTYPE_AWARE_TYPES.has(t));
  const subtypeSelections = {};
  for (const at of subtypeAware) {
    subtypeSelections[at] = new Set(f.subtype_filters[at] || []);
  }
  const subtypeWrap = el('div', {});
  subtypeWrap.appendChild(el('label', { class: 'field-label' }, 'Subtype filters (per source)'));
  const subtypeBody = el('div', {});
  subtypeWrap.appendChild(subtypeBody);
  if (!subtypeAware.length) {
    subtypeBody.appendChild(el('div', { style: 'font-size:0.75rem;color:var(--text-soft);' },
      'No subscribed alert types support sub-type filtering. Add RFS, BOM, Traffic, Waze, or User incidents to use this.'));
  } else {
    // Placeholder rows shown immediately; replaced once catalogue resolves.
    for (const at of subtypeAware) {
      const row = el('div', {
        id: `subtype-row-${at}-${preset.id}`,
        style: 'border:1px solid var(--border-subtle);border-radius:0.45rem;padding:0.45rem 0.55rem;margin-bottom:0.35rem;',
      }, [
        el('div', { style: 'display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;' }, [
          el('span', { style: 'font-size:0.78rem;font-weight:600;' }, ALERT_TYPE_LABELS[at] || at),
          el('span', { class: 'subtype-summary', style: 'font-size:0.7rem;color:var(--text-soft);' },
             subtypeSelections[at].size
               ? `${subtypeSelections[at].size} selected`
               : 'all subtypes'),
        ]),
        el('div', { class: 'subtype-chips', style: 'display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem;font-size:0.75rem;color:var(--text-soft);' },
           'Loading subtypes…'),
      ]);
      subtypeBody.appendChild(row);
    }
    // Async populate the chip rows.
    fetchFilterCatalogue().then(catalogue => {
      for (const at of subtypeAware) {
        const row = document.getElementById(`subtype-row-${at}-${preset.id}`);
        if (!row) continue;
        const chipBox = row.querySelector('.subtype-chips');
        const summary = row.querySelector('.subtype-summary');
        if (!chipBox) continue;
        chipBox.innerHTML = '';
        const opts = subtypeOptionsFor(catalogue, at);
        if (!opts.length) {
          chipBox.appendChild(el('span', {}, 'No subtypes recorded yet for this source.'));
          continue;
        }
        const updateSummary = () => {
          summary.textContent = subtypeSelections[at].size
            ? `${subtypeSelections[at].size} selected`
            : 'all subtypes';
        };
        for (const v of opts) {
          const isSel = subtypeSelections[at].has(v);
          const chip = el('button', {
            type: 'button',
            class: 'chip' + (isSel ? ' active' : ''),
            style: 'cursor:pointer;font-size:0.72rem;padding:0.2rem 0.55rem;',
          }, v);
          chip.onclick = (e) => {
            e.preventDefault();
            if (subtypeSelections[at].has(v)) {
              subtypeSelections[at].delete(v);
              chip.classList.remove('active');
            } else {
              subtypeSelections[at].add(v);
              chip.classList.add('active');
            }
            updateSummary();
          };
          chipBox.appendChild(chip);
        }
        // Pre-existing selections that aren't in the catalogue (rare —
        // user previously selected a value that since stopped appearing
        // in data_history). Surface them as orphan chips so the user
        // can deselect, but mark them.
        for (const v of subtypeSelections[at]) {
          if (!opts.includes(v)) {
            const chip = el('button', {
              type: 'button',
              class: 'chip active',
              style: 'cursor:pointer;font-size:0.72rem;padding:0.2rem 0.55rem;opacity:0.65;',
              title: 'Not currently in the data catalogue — click to remove.',
            }, v + ' *');
            chip.onclick = (e) => {
              e.preventDefault();
              subtypeSelections[at].delete(v);
              chip.remove();
              updateSummary();
            };
            chipBox.appendChild(chip);
          }
        }
      }
    });
    subtypeWrap.appendChild(el('div', {
      style: 'font-size:0.7rem;color:var(--text-soft);margin-top:0.35rem',
    }, 'Empty selection = all subtypes pass. Pick one or more to whitelist. Alerts with no subtype field still come through.'));
  }
  body.appendChild(subtypeWrap);

  // ---- geofilter (interactive map) ----
  const geofilterMap = makeGeofilterMap(preset, f.geofilter);
  body.appendChild(el('div', {}, [
    el('label', { class: 'field-label' }, 'Geographic filter (only fires for alerts with lat/lng inside the chosen shape)'),
    geofilterMap.dom,
  ]));

  // ---- Action row ----
  const buildPayload = () => {
    const parseList = (s) => (s || '').split(',').map(x => x.trim()).filter(Boolean);
    const inc = parseList(incTa.value);
    const exc = parseList(excTa.value);
    const sev = {};
    for (const [at, sel] of Object.entries(sevSelects)) {
      if (!sel.disabled && sel.value) sev[at] = sel.value;
    }
    const subtypes = {};
    for (const [at, set] of Object.entries(subtypeSelections)) {
      if (set.size) subtypes[at] = Array.from(set);
    }
    const gf = geofilterMap.get();
    const out = {};
    if (inc.length) out.keywords_include = inc;
    if (exc.length) out.keywords_exclude = exc;
    if (Object.keys(sev).length) out.severity_min = sev;
    if (Object.keys(subtypes).length) out.subtype_filters = subtypes;
    if (gf) out.geofilter = gf;
    return out;
  };

  const saveBtn = el('button', {
    class: 'btn btn-primary btn-sm',
    onclick: async () => {
      let payload;
      try {
        payload = buildPayload();
      } catch (e) {
        alert(e.message); return;
      }
      saveBtn.disabled = true;
      try {
        await patchPreset(preset.id, { filters: payload });
      } finally {
        saveBtn.disabled = false;
      }
    },
  }, [el('i', { class: 'fa-solid fa-check' }), ' Save filters']);

  const resetBtn = el('button', {
    class: 'btn btn-ghost btn-sm',
    onclick: async () => {
      incTa.value = ''; excTa.value = '';
      for (const sel of Object.values(sevSelects)) {
        if (!sel.disabled) sel.value = '';
      }
      for (const set of Object.values(subtypeSelections)) set.clear();
      // Re-render chips as unselected.
      for (const at of Object.keys(subtypeSelections)) {
        const row = document.getElementById(`subtype-row-${at}-${preset.id}`);
        if (!row) continue;
        for (const chip of row.querySelectorAll('.subtype-chips .chip')) {
          chip.classList.remove('active');
        }
        const summary = row.querySelector('.subtype-summary');
        if (summary) summary.textContent = 'all subtypes';
      }
      geofilterMap.set(null);
      await patchPreset(preset.id, { filters: {} });
    },
  }, [el('i', { class: 'fa-solid fa-rotate-left' }), ' Reset filters']);

  body.appendChild(el('div', { class: 'filters-actions' }, [saveBtn, resetBtn]));

  card.appendChild(body);
  return card;
}

function renderPresetMuteCard(preset) {
  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'card-row' }, [
    el('span', { class: 'label' }, [
      el('span', {}, 'Alerts'),
      el('span', { class: 'sub' }, 'On: this preset fires normally. Off: the preset is paused but stays configured.'),
    ]),
    makeSwitch(!!preset.enabled, (checked) => patchPreset(preset.id, { enabled: checked }), 'Preset alerts on/off'),
  ]));
  card.appendChild(el('div', { class: 'card-row' }, [
    el('span', { class: 'label' }, [
      el('span', {}, 'Role pings'),
      el('span', { class: 'sub' }, 'On: alerts mention the configured roles. Off: alerts post silently.'),
    ]),
    makeSwitch(!!preset.enabled_ping, (checked) => patchPreset(preset.id, { enabled_ping: checked }), 'Preset pings on/off'),
  ]));
  return card;
}

function renderSidebarChannelMute(chId) {
  const cm = channelMute(chId);
  const g = state.muteState.guild;
  const forcedOff = !g.enabled;
  const forcedPingOff = !g.enabled_ping;

  const row1 = el('div', { class: 'sb-ch-mute-row' }, [
    el('span', { class: 'sb-ch-mute-label' }, 'Alerts'),
    makeSwitch(!!cm.enabled,
      (checked) => setChannelMute(chId, { enabled: checked }),
      forcedOff ? 'Guild alerts are off — this switch has no effect' : 'On: presets in this channel fire. Off: channel is silent.',
      { small: true }),
  ]);
  const row2 = el('div', { class: 'sb-ch-mute-row' }, [
    el('span', { class: 'sb-ch-mute-label' }, 'Role pings'),
    makeSwitch(!!cm.enabled_ping,
      (checked) => setChannelMute(chId, { enabled_ping: checked }),
      forcedPingOff ? 'Guild pings are off — this switch has no effect' : 'On: presets in this channel mention roles. Off: alerts post silently.',
      { small: true }),
  ]);
  return el('div', { class: 'sb-ch-mute', onclick: (e) => e.stopPropagation() }, [row1, row2]);
}

function renderOverridesCard(preset) {
  const list = el('div', { class: 'override-list' });
  const overrides = preset.type_overrides || {};
  const types = [...(preset.alert_types || [])].sort(
    (a, b) => _DASH_ALERT_TYPES.indexOf(a) - _DASH_ALERT_TYPES.indexOf(b));

  for (const t of types) {
    const ov = overrides[t];
    const hasOv = !!ov;
    const effEnabled = hasOv && ov.enabled != null ? !!ov.enabled : !!preset.enabled;
    const effPing = hasOv && ov.enabled_ping != null ? !!ov.enabled_ping : !!preset.enabled_ping;

    const badge = hasOv
      ? el('span', { class: 'override-badge override-on', title: 'Explicit override — click X to reset' }, 'override')
      : el('span', { class: 'override-badge inherit-on', title: 'Inheriting from preset defaults — toggle to override' }, 'inherit');

    const enabledToggle = makeSwitch(effEnabled, (checked) => {
      // Always write an override when the user toggles
      setTypeOverride(preset.id, t, { enabled: checked, enabled_ping: effPing });
    }, 'Enable this alert type', { small: true });
    const pingToggle = makeSwitch(effPing, (checked) => {
      setTypeOverride(preset.id, t, { enabled: effEnabled, enabled_ping: checked });
    }, 'Pings for this alert type', { small: true });

    const row = el('div', {
      class: 'override-row' + (hasOv ? '' : ' inherited'),
    }, [
      el('span', { class: 'override-name' }, [
        el('span', {}, ALERT_TYPE_LABELS[t] || t),
        el('span', { class: 'override-mono' }, t),
        el('div', { style: 'display:flex;gap:0.4rem;margin-top:0.15rem;align-items:center' }, badge),
      ]),
      el('span', { class: 'mini-toggle' + (hasOv ? '' : ' dim') }, [
        el('i', { class: 'fa-solid fa-bell', title: 'Enabled' }),
        enabledToggle,
      ]),
      el('span', { class: 'mini-toggle' + (hasOv ? '' : ' dim') }, [
        el('i', { class: 'fa-solid fa-at', title: 'Ping roles' }),
        pingToggle,
      ]),
      el('button', {
        class: 'override-reset',
        title: hasOv ? 'Reset to inherit preset default' : 'No override to reset',
        disabled: hasOv ? false : 'disabled',
        onclick: () => hasOv && clearTypeOverride(preset.id, t),
      }, el('i', { class: 'fa-solid fa-xmark' })),
    ]);
    list.appendChild(row);
  }
  return list;
}

/* -------------------- Preset mutations -------------------- */

async function patchPreset(presetId, patch) {
  const prev = presetById(presetId);
  if (!prev) return;
  // Optimistic
  const optimistic = { ...prev, ...patch };
  replacePreset(optimistic);
  render();
  try {
    const res = await api(`/api/dashboard/guilds/${state.activeGuildId}/presets/${presetId}`, {
      method: 'PATCH',
      body: JSON.stringify(patch),
    });
    if (res && res.preset) {
      replacePreset(res.preset);
      render();
    }
  } catch (e) {
    // Revert
    replacePreset(prev);
    render();
    handleApiError(e, 'Failed to update preset.');
  }
}

async function renamePreset(presetId, name) {
  await patchPreset(presetId, { name });
}

async function toggleAlertType(presetId, type) {
  const preset = presetById(presetId);
  if (!preset) return;
  const current = new Set(preset.alert_types || []);
  if (current.has(type)) current.delete(type);
  else current.add(type);
  // Keep canonical ordering
  const next = _DASH_ALERT_TYPES.filter(t => current.has(t));
  await patchPreset(presetId, { alert_types: next });
}

async function deletePreset(presetId) {
  const preset = presetById(presetId);
  if (!preset) return;
  const ok = await confirmDialog(
    'Delete preset?',
    `This will permanently remove the “${preset.name}” preset. This cannot be undone.`,
    'Delete', true,
  );
  if (!ok) return;
  try {
    await api(`/api/dashboard/guilds/${state.activeGuildId}/presets/${presetId}`, { method: 'DELETE' });
    state.presets = state.presets.filter(p => String(p.id) !== String(presetId));
    if (String(state.selectedPresetId) === String(presetId)) {
      state.selectedPresetId = null;
      // Prefer another preset in the same channel, else first overall
      const same = presetsByChannel(preset.channel_id);
      if (same.length) state.selectedPresetId = same[0].id;
      else {
        const first = sortedPresets()[0];
        if (first) state.selectedPresetId = first.id;
        else { state.view = 'empty'; }
      }
    }
    toast('Preset deleted.', 'ok');
    render();
  } catch (e) {
    handleApiError(e, 'Failed to delete preset.');
  }
}

async function setTypeOverride(presetId, alertType, body) {
  const prev = presetById(presetId);
  if (!prev) return;
  const prevOv = (prev.type_overrides || {})[alertType] || null;
  // Optimistic
  const nextOverrides = { ...(prev.type_overrides || {}) };
  nextOverrides[alertType] = { ...body };
  replacePreset({ ...prev, type_overrides: nextOverrides });
  render();
  try {
    const res = await api(
      `/api/dashboard/guilds/${state.activeGuildId}/presets/${presetId}/type-overrides/${alertType}`,
      { method: 'PUT', body: JSON.stringify(body) },
    );
    if (res && res.preset) {
      replacePreset(res.preset);
      render();
    }
  } catch (e) {
    // Revert
    const revertOv = { ...(prev.type_overrides || {}) };
    if (prevOv) revertOv[alertType] = prevOv;
    else delete revertOv[alertType];
    replacePreset({ ...prev, type_overrides: revertOv });
    render();
    handleApiError(e, 'Failed to set override.');
  }
}

async function clearTypeOverride(presetId, alertType) {
  const prev = presetById(presetId);
  if (!prev) return;
  const prevOv = (prev.type_overrides || {})[alertType] || null;
  // Optimistic
  const nextOverrides = { ...(prev.type_overrides || {}) };
  delete nextOverrides[alertType];
  replacePreset({ ...prev, type_overrides: nextOverrides });
  render();
  try {
    const res = await api(
      `/api/dashboard/guilds/${state.activeGuildId}/presets/${presetId}/type-overrides/${alertType}`,
      { method: 'DELETE' },
    );
    if (res && res.preset) {
      replacePreset(res.preset);
      render();
    }
  } catch (e) {
    // Revert
    const revertOv = { ...(prev.type_overrides || {}) };
    if (prevOv) revertOv[alertType] = prevOv;
    replacePreset({ ...prev, type_overrides: revertOv });
    render();
    handleApiError(e, 'Failed to reset override.');
  }
}

function replacePreset(preset) {
  const i = state.presets.findIndex(p => String(p.id) === String(preset.id));
  if (i >= 0) state.presets[i] = preset;
  else state.presets.push(preset);
}

/* -------------------- Mute-state mutations -------------------- */

async function setGuildMute(patch) {
  const prev = { ...state.muteState.guild };
  state.muteState.guild = { ...prev, ...patch };
  render();
  try {
    // If both enabled+enabled_ping are back to true, we can DELETE; else PUT.
    const next = state.muteState.guild;
    if (next.enabled === true && next.enabled_ping === true) {
      const res = await api(`/api/dashboard/guilds/${state.activeGuildId}/mute-state/guild`, { method: 'DELETE' });
      // Leave optimistic state as-is (both true)
      void res;
    } else {
      const res = await api(`/api/dashboard/guilds/${state.activeGuildId}/mute-state/guild`, {
        method: 'PUT', body: JSON.stringify(patch),
      });
      if (res && res.guild) {
        state.muteState.guild = { enabled: !!res.guild.enabled, enabled_ping: !!res.guild.enabled_ping };
        render();
      }
    }
  } catch (e) {
    state.muteState.guild = prev;
    render();
    handleApiError(e, 'Failed to update guild mute.');
  }
}

async function setChannelMute(chId, patch) {
  const key = String(chId);
  const prev = { ...channelMute(chId) };
  const next = { ...prev, ...patch, channel_id: key };
  state.muteState.channels.set(key, next);
  render();
  try {
    if (next.enabled === true && next.enabled_ping === true) {
      await api(`/api/dashboard/guilds/${state.activeGuildId}/mute-state/channels/${chId}`, { method: 'DELETE' });
      // Keep optimistic (both true); equivalent to no record.
      state.muteState.channels.delete(key);
      render();
    } else {
      const res = await api(`/api/dashboard/guilds/${state.activeGuildId}/mute-state/channels/${chId}`, {
        method: 'PUT', body: JSON.stringify(patch),
      });
      if (res && res.channel) {
        state.muteState.channels.set(key, {
          channel_id: String(res.channel.channel_id),
          enabled: !!res.channel.enabled,
          enabled_ping: !!res.channel.enabled_ping,
        });
        render();
      }
    }
  } catch (e) {
    state.muteState.channels.set(key, prev);
    render();
    handleApiError(e, 'Failed to update channel mute.');
  }
}


/* -------------------- Wizard (3-step) -------------------- */

function openWizard(defaultChannelId = null) {
  state.wizard = {
    step: defaultChannelId ? 2 : 1,
    channelId: defaultChannelId || null,
    name: '',
    types: new Set(),
    pagerEnabled: false,
    search: '',
    saving: false,
  };
  state.view = 'wizard';
  if (isMobile()) state.drawerOpen = false;
  render();
}

function closeWizard() {
  state.wizard = null;
  if (state.presets.length === 0) {
    state.view = 'empty';
    state.selectedPresetId = null;
  } else {
    state.view = 'editor';
    if (!state.selectedPresetId) {
      const first = sortedPresets()[0];
      if (first) state.selectedPresetId = first.id;
    }
  }
  render();
}

function renderWizard() {
  const w = state.wizard;
  const wrap = el('div', { class: 'wizard' });

  wrap.appendChild(el('div', { class: 'wizard-head' }, [
    el('h2', {}, 'Create preset'),
    el('button', { class: 'btn btn-ghost btn-sm', onclick: () => closeWizard() },
      [el('i', { class: 'fa-solid fa-xmark' }), ' Cancel']),
  ]));

  wrap.appendChild(el('div', { class: 'wizard-steps' }, [
    el('span', { class: 'wizard-step' + (w.step === 1 ? ' active' : (w.step > 1 ? ' done' : '')) }, '1 · Channel'),
    el('span', { class: 'wizard-step' + (w.step === 2 ? ' active' : (w.step > 2 ? ' done' : '')) }, '2 · Name'),
    el('span', { class: 'wizard-step' + (w.step === 3 ? ' active' : '') }, '3 · Alert types'),
  ]));

  const body = el('div', { class: 'wizard-body' });
  if (w.step === 1) body.appendChild(renderWizardStep1());
  else if (w.step === 2) body.appendChild(renderWizardStep2());
  else body.appendChild(renderWizardStep3());
  wrap.appendChild(body);

  wrap.appendChild(renderWizardNav());
  return wrap;
}

function renderWizardStep1() {
  const w = state.wizard;
  const container = el('div', {});
  container.appendChild(el('p', { style: 'margin:0 0 0.6rem;color:var(--text-muted);font-size:0.88rem' },
    'Pick the text channel where alerts should be posted.'));
  container.appendChild(el('input', {
    class: 'form-input wizard-search',
    placeholder: 'Search channels…',
    value: w.search,
    oninput: (e) => { w.search = e.target.value; renderWizardBodyOnly(); },
  }));

  const list = el('div', { class: 'channel-picker' });
  const q = w.search.trim().toLowerCase();
  const chans = sortedChannels();
  const filtered = q ? chans.filter(c => (c.name || '').toLowerCase().includes(q)) : chans;

  if (filtered.length === 0) {
    list.appendChild(el('div', { class: 'empty', style: 'margin:0.3rem' }, 'No channels match.'));
  } else {
    const groups = new Map();
    for (const c of filtered) {
      const cat = c.parent_name || c.category_name || c.category || '';
      if (!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(c);
    }
    const hasCategories = Array.from(groups.keys()).some(k => !!k) && groups.size > 1;
    if (hasCategories) {
      for (const [cat, items] of groups) {
        if (cat) list.appendChild(el('div', { class: 'channel-cat-label' }, cat));
        for (const c of items) list.appendChild(renderWizardChannelOpt(c));
      }
    } else {
      for (const c of filtered) list.appendChild(renderWizardChannelOpt(c));
    }
  }
  container.appendChild(list);
  return container;
}

function renderWizardChannelOpt(c) {
  const w = state.wizard;
  const selected = String(w.channelId) === String(c.id);
  const hasExisting = state.presets.some(p => String(p.channel_id) === String(c.id));
  return el('div', {
    class: 'channel-opt' + (selected ? ' selected' : ''),
    onclick: () => { w.channelId = c.id; renderWizardBodyOnly(); },
  }, [
    el('input', { type: 'radio', name: 'wizard-ch', checked: selected ? 'checked' : false,
      onclick: (e) => { e.stopPropagation(); w.channelId = c.id; renderWizardBodyOnly(); } }),
    el('span', { class: 'hash' }, '#'),
    el('span', { class: 'name' }, c.name || '(unnamed)'),
    hasExisting ? el('span', { class: 'existing-note' }, 'already has preset(s)') : null,
  ]);
}

function renderWizardStep2() {
  const w = state.wizard;
  const ch = channelById(w.channelId);
  const container = el('div', {});
  container.appendChild(el('p', { style: 'margin:0 0 0.6rem;color:var(--text-muted);font-size:0.88rem' },
    `Give your preset a short, descriptive name. It will post to #${ch ? ch.name : ''}.`));
  const suggest = el('input', {
    class: 'form-input wizard-search',
    id: 'wizard-name-input',
    placeholder: 'e.g. Critical fires, BOM watches…',
    value: w.name || '',
    maxlength: '100',
    oninput: (e) => {
      w.name = e.target.value;
      // Update Next button state without rebuilding the input (would lose focus)
      const nav = document.querySelector('.wizard-foot');
      if (nav) {
        const btn = nav.querySelector('.btn-primary');
        if (btn) btn.disabled = !(w.name && w.name.trim());
      }
    },
    onkeydown: (e) => {
      if (e.key === 'Enter' && w.name && w.name.trim()) {
        e.preventDefault();
        w.step = 3; render();
      }
    },
  });
  container.appendChild(suggest);
  setTimeout(() => { try { suggest.focus(); } catch(_){} }, 30);
  return container;
}

// Wizard provider expand/collapse state — keyed by provider.key alone since
// the wizard only edits one in-flight preset at a time.
const _wizardProviderOpen = new Map();

function renderWizardStep3() {
  const w = state.wizard;
  const container = el('div', {});
  container.appendChild(el('p', { style: 'margin:0 0 0.6rem;color:var(--text-muted);font-size:0.88rem' },
    'Select the alert types to include. You can optionally enable the pager channel too.'));

  container.appendChild(el('div', { class: 'select-row' }, [
    el('span', {}, `${w.types.size} selected`),
    el('span', { style: 'flex:1' }),
    el('button', { class: 'link-btn', onclick: () => { _DASH_ALERT_TYPES.forEach(k => w.types.add(k)); renderWizardBodyOnly(); } }, 'Select all'),
    el('button', { class: 'link-btn', onclick: () => { w.types.clear(); renderWizardBodyOnly(); } }, 'Clear all'),
  ]));

  const list = el('div', { class: 'provider-list' });
  for (const provider of PROVIDERS) {
    const hasSelected = provider.types.some(t => w.types.has(t.key));
    const expanded = _wizardProviderOpen.has(provider.key)
      ? !!_wizardProviderOpen.get(provider.key)
      : hasSelected;
    list.appendChild(_renderProviderSection(provider, w.types, {
      presetId: '__wizard__',
      expanded,
      onExpand: (open) => {
        _wizardProviderOpen.set(provider.key, !!open);
        renderWizardBodyOnly();
      },
      onToggleType: (typeKey) => {
        if (w.types.has(typeKey)) w.types.delete(typeKey);
        else w.types.add(typeKey);
        renderWizardBodyOnly();
      },
      onSelectAll: (turnOn) => {
        for (const t of provider.types) {
          if (turnOn) w.types.add(t.key); else w.types.delete(t.key);
        }
        renderWizardBodyOnly();
      },
    }));
  }
  container.appendChild(list);

  // Pager flag — kept as a standalone toggle so the visual mapping stays
  // "providers expand into types" while pager (capcode-driven) sits
  // alongside as a non-provider channel.
  const pagerWrap = el('div', { style: 'margin-top:0.6rem' });
  pagerWrap.appendChild(el('label', {
    class: 'type-opt' + (w.pagerEnabled ? ' selected' : ''),
  }, [
    el('input', { type: 'checkbox', checked: w.pagerEnabled ? 'checked' : false,
      onchange: (e) => { w.pagerEnabled = !!e.target.checked; renderWizardBodyOnly(); } }),
    el('span', {}, 'Pager messages'),
    el('span', { style: 'margin-left:auto;color:var(--text-soft);font-family:monospace;font-size:0.7rem' }, 'pager'),
  ]));
  container.appendChild(pagerWrap);
  return container;
}

function renderWizardNav() {
  const w = state.wizard;
  const nav = el('div', { class: 'wizard-foot' });
  const left = el('div', {});
  const right = el('div', { style: 'display:flex;gap:0.5rem' });

  if (w.step > 1) {
    left.appendChild(el('button', { class: 'btn btn-ghost btn-sm',
      onclick: () => { w.step -= 1; render(); } }, [el('i', { class: 'fa-solid fa-arrow-left' }), ' Back']));
  }

  if (w.step === 1) {
    const next = el('button', { class: 'btn btn-primary btn-sm',
      onclick: () => { w.step = 2; render(); } }, ['Next ', el('i', { class: 'fa-solid fa-arrow-right' })]);
    if (!w.channelId) next.disabled = true;
    right.appendChild(next);
  } else if (w.step === 2) {
    const next = el('button', { class: 'btn btn-primary btn-sm',
      onclick: () => {
        // Pull latest value from the input before advancing
        const inp = qs('wizard-name-input');
        if (inp) w.name = inp.value || '';
        w.step = 3; render();
      } }, ['Next ', el('i', { class: 'fa-solid fa-arrow-right' })]);
    if (!(w.name && w.name.trim())) next.disabled = true;
    right.appendChild(next);
  } else {
    const save = el('button', { class: 'btn btn-primary btn-sm',
      onclick: () => wizardSave(),
    }, w.saving ? [el('span', { class: 'spinner' }), ' Saving…'] : [el('i', { class: 'fa-solid fa-check' }), ' Create preset']);
    if (w.saving || (w.types.size === 0 && !w.pagerEnabled)) save.disabled = true;
    right.appendChild(save);
  }
  nav.appendChild(left);
  nav.appendChild(right);
  return nav;
}

function renderWizardBodyOnly() {
  const body = document.querySelector('.wizard-body');
  const nav  = document.querySelector('.wizard-foot');
  if (!body || !nav) { render(); return; }
  // Preserve both the wizard-body scroll and any inner scroller (e.g. channel/type list),
  // otherwise a click rebuilds the DOM and jumps the list back to the top.
  const outerScroll = body.scrollTop;
  const innerScroller = body.querySelector('.channel-picker, .type-list');
  const innerScroll = innerScroller ? innerScroller.scrollTop : 0;

  body.innerHTML = '';
  const w = state.wizard;
  if (w.step === 1) body.appendChild(renderWizardStep1());
  else if (w.step === 2) body.appendChild(renderWizardStep2());
  else body.appendChild(renderWizardStep3());
  const newNav = renderWizardNav();
  nav.replaceWith(newNav);

  body.scrollTop = outerScroll;
  const newInner = body.querySelector('.channel-picker, .type-list');
  if (newInner) newInner.scrollTop = innerScroll;
}

async function wizardSave() {
  const w = state.wizard;
  if (!w.channelId || !(w.name && w.name.trim())) return;
  if (w.types.size === 0 && !w.pagerEnabled) return;
  w.saving = true; render();
  try {
    const res = await api(`/api/dashboard/guilds/${state.activeGuildId}/presets`, {
      method: 'POST',
      body: JSON.stringify({
        channel_id: w.channelId,
        name: w.name.trim(),
        alert_types: _DASH_ALERT_TYPES.filter(t => w.types.has(t)),
        pager_enabled: !!w.pagerEnabled,
        role_ids: [],
        enabled: true,
        enabled_ping: true,
      }),
    });
    if (res && res.preset) {
      state.presets.push(res.preset);
      state.selectedPresetId = res.preset.id;
      state.openChannels.add(String(res.preset.channel_id));
      state.view = 'editor';
      toast(`Created preset “${res.preset.name}”.`, 'ok');
    }
    state.wizard = null;
    render();
  } catch (e) {
    w.saving = false;
    render();
    handleApiError(e, 'Failed to create preset.');
  }
}

/* -------------------- Admin overview -------------------- */

async function openAdmin() {
  state.view = 'admin';
  state.admin = { loading: true, data: null, error: null };
  state.adminSources = { loading: true, data: null, error: null };
  if (isMobile()) state.drawerOpen = false;
  render();
  // Fire both in parallel — sources panel is independent and shouldn't block
  // the main overview if it lags or errors.
  const overviewP = api('/api/dashboard/admin/overview')
    .then(data => { state.admin = { loading: false, data, error: null }; })
    .catch(e => { state.admin = { loading: false, data: null, error: (e && e.message) || 'Failed to load admin data.' }; });
  const sourcesP = loadAdminSources();
  await Promise.all([overviewP, sourcesP]);
  render();
}

async function loadAdminSources() {
  state.adminSources = { loading: true, data: null, error: null };
  try {
    const data = await api('/api/dashboard/admin/sources');
    state.adminSources = { loading: false, data, error: null };
  } catch (e) {
    state.adminSources = { loading: false, data: null, error: (e && e.message) || 'Failed to load source health.' };
  }
}

function renderAdmin() {
  const a = state.admin || {};
  const wrap = el('div', { class: 'admin-wrap' });
  wrap.appendChild(el('div', { class: 'overview-head' }, [
    el('h2', {}, 'Admin overview'),
    el('div', { class: 'overview-actions' }, [
      el('button', { class: 'btn btn-ghost btn-sm', onclick: () => openAdmin() },
        [el('i', { class: 'fa-solid fa-rotate' }), ' Refresh']),
    ]),
  ]));

  if (a.loading) {
    wrap.appendChild(el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Loading…']));
    return wrap;
  }
  if (a.error) {
    wrap.appendChild(el('div', { class: 'empty' }, [el('i', { class: 'fa-solid fa-triangle-exclamation' }), ' ', a.error]));
    return wrap;
  }
  if (!a.data) {
    wrap.appendChild(el('div', { class: 'empty' }, 'No data.'));
    return wrap;
  }
  const d = a.data;
  const s = d.stats || {};

  const cards = el('div', { class: 'stat-grid' });
  const dashFmt = (v) => (v === null || v === undefined ? '—' : v);
  cards.appendChild(statCard('Servers', dashFmt(s.servers_total), 'fa-server'));
  cards.appendChild(statCard('User installs', dashFmt(s.user_installs), 'fa-user-plus'));
  cards.appendChild(statCard('Dashboard users', s.dashboard_users ?? s.users_total ?? 0, 'fa-users'));
  cards.appendChild(statCard('Active sessions', s.sessions_active || 0, 'fa-plug'));
  cards.appendChild(statCard('Guilds w/ presets', s.guilds_with_presets || 0, 'fa-folder-tree'));
  cards.appendChild(statCard('Channels configured', s.channels_configured || 0, 'fa-hashtag'));
  cards.appendChild(statCard('Total presets', s.presets_total || 0, 'fa-layer-group'));
  cards.appendChild(statCard('Pager presets', s.presets_pager || 0, 'fa-pager'));
  cards.appendChild(statCard('Muted presets', s.presets_muted || 0, 'fa-volume-xmark'));
  cards.appendChild(statCard('Muted channels', s.channels_muted || 0, 'fa-bell-slash'));
  cards.appendChild(statCard('Muted guilds', s.guilds_muted || 0, 'fa-shield-halved'));
  wrap.appendChild(cards);

  // Data-source health panel
  const sourcesHost = el('div', { id: 'admin-sources-host' });
  sourcesHost.appendChild(renderAdminSources());
  wrap.appendChild(sourcesHost);

// State labels mapped to friendlier wording for the source-health panel.
const _SRC_STATE_LABEL = {
  ok: 'Healthy',
  degraded: 'Degraded',
  down: 'Down',
  unknown: 'No data yet',
};

// Auto-refresh handle. Set when the admin view mounts; cleared when the
// user navigates away.
let _adminSourcesTimer = null;

function startAdminSourcesAutoRefresh() {
  if (_adminSourcesTimer) return;
  _adminSourcesTimer = setInterval(async () => {
    if (state.view !== 'admin') return;
    try {
      await loadAdminSources();
      // Repaint just the sources host so the user's scroll position is preserved.
      const host = document.getElementById('admin-sources-host');
      if (host) { host.innerHTML = ''; host.appendChild(renderAdminSources()); }
    } catch (_) {}
  }, 30000);  // every 30s — matches typical poll cadence
}

function stopAdminSourcesAutoRefresh() {
  if (_adminSourcesTimer) {
    clearInterval(_adminSourcesTimer);
    _adminSourcesTimer = null;
  }
}

async function clearAdminSources() {
  const ok = await confirmDialog(
    'Reset source counters?',
    'This wipes the success/failure totals and last-error messages for every source. Counters resume from zero.',
    'Reset', /*okDanger=*/false);
  if (!ok) return;
  try {
    await api('/api/dashboard/admin/sources', { method: 'DELETE' });
    await loadAdminSources();
    const host = document.getElementById('admin-sources-host');
    if (host) { host.innerHTML = ''; host.appendChild(renderAdminSources()); }
    toast('Source counters cleared.', 'ok');
  } catch (e) {
    handleApiError(e, 'Clear failed.');
  }
}

function renderAdminSources() {
  const wrap = el('div', { class: 'admin-sources' });
  startAdminSourcesAutoRefresh();
  wrap.appendChild(el('h3', { class: 'section-head' }, [
    'Data sources',
    el('button', {
      class: 'btn btn-ghost btn-sm',
      style: 'margin-left: 0.6rem; padding: 0.15rem 0.55rem; font-size: 0.7rem; vertical-align: middle;',
      onclick: async () => {
        await loadAdminSources();
        const host = document.getElementById('admin-sources-host');
        if (host) { host.innerHTML = ''; host.appendChild(renderAdminSources()); }
      },
    }, [el('i', { class: 'fa-solid fa-rotate' }), ' Refresh']),
    el('button', {
      class: 'btn btn-ghost btn-sm',
      style: 'margin-left: 0.4rem; padding: 0.15rem 0.55rem; font-size: 0.7rem; vertical-align: middle;',
      onclick: () => clearAdminSources(),
    }, [el('i', { class: 'fa-solid fa-eraser' }), ' Clear stats']),
  ]));

  const sa = state.adminSources || {};
  if (sa.loading && !(sa.data && sa.data.sources)) {
    wrap.appendChild(el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Loading sources…']));
    return wrap;
  }
  if (sa.error) {
    wrap.appendChild(el('div', { class: 'empty' }, [
      el('i', { class: 'fa-solid fa-triangle-exclamation' }), ' ', sa.error,
    ]));
    return wrap;
  }
  const data = sa.data;
  const sources = (data && data.sources) || [];
  if (!sources.length) {
    wrap.appendChild(el('div', { class: 'empty' }, 'No sources reporting yet.'));
    return wrap;
  }

  const serverNow = Number((data && data.server_time) || 0) || Math.floor(Date.now() / 1000);
  const grid = el('div', { class: 'src-grid' });
  for (const src of sources) {
    const stateStr = src.state || 'unknown';
    const card = el('div', { class: 'src-card' });
    card.appendChild(el('div', { class: 'src-card-head' }, [
      el('span', { class: 'src-label' }, src.label || src.name),
      el('span', { class: `src-state ${stateStr}` }, _SRC_STATE_LABEL[stateStr] || stateStr),
    ]));

    let lastLine;
    if (src.last_success) {
      const age = Math.max(0, serverNow - Number(src.last_success));
      lastLine = el('div', { class: 'src-meta' }, [
        el('i', { class: 'fa-regular fa-clock' }),
        ` Last success: ${formatAge(age)} ago`,
      ]);
    } else {
      lastLine = el('div', { class: 'src-meta src-meta-muted' }, [
        el('i', { class: 'fa-regular fa-clock' }),
        ' No successful fetch yet',
      ]);
    }
    card.appendChild(lastLine);

    const totSuccess = src.total_success || 0;
    const totFail = src.total_fail || 0;
    card.appendChild(el('div', { class: 'src-totals' }, [
      el('span', { class: 'src-tot-ok', title: 'Successful fetches since last reset' }, [
        el('i', { class: 'fa-solid fa-check' }),
        ` ${totSuccess} successful`,
      ]),
      el('span', { class: 'src-tot-sep' }, '·'),
      el('span', { class: 'src-tot-fail' + (totFail > 0 ? ' has-fail' : ''), title: 'Failed fetches since last reset' }, [
        el('i', { class: 'fa-solid fa-xmark' }),
        ` ${totFail} failed`,
      ]),
    ]));

    if (src.last_error_msg) {
      card.appendChild(el('div', { class: 'src-err' }, [
        el('i', { class: 'fa-solid fa-circle-exclamation' }), ' ',
        el('span', {}, String(src.last_error_msg)),
        el('span', { class: 'src-consec' },
          `${src.consec_fails || 0} in a row`),
      ]));
    }
    grid.appendChild(card);
  }
  wrap.appendChild(grid);
  return wrap;
}

/* -------------------- Admin broadcast -------------------- */

const bcast = {
  loaded: false,
  loading: false,
  targets: [],          // [{guild_id, guild_name, channels:[{id,name}], selected_channel_id, include}]
  form: {
    title: 'NSW PSN announcement',
    description: '',
    color: '#f97316',
    footer: '',
    url: '',
  },
  sending: false,
  lastResults: null,    // { sent, total, results: [...] }
};

async function loadBroadcastTargets(force=false) {
  if (bcast.loaded && !force) return;
  bcast.loading = true; render();
  try {
    const res = await api('/api/dashboard/admin/broadcast/targets');
    bcast.targets = (res.targets || []).map(t => ({
      ...t,
      selected_channel_id: t.detected_channel_id || '',
      include: !!t.detected_channel_id,
    }));
    bcast.loaded = true;
  } catch (e) {
    toast((e && e.message) || 'Failed to load broadcast targets.', 'err');
  } finally {
    bcast.loading = false;
    render();
  }
}

async function submitBroadcast() {
  const wantTargets = bcast.targets.filter(t => t.include && t.selected_channel_id);
  if (wantTargets.length === 0) {
    toast('Select at least one target channel.', 'err');
    return;
  }
  if (!bcast.form.title.trim() && !bcast.form.description.trim()) {
    toast('Add a title or description.', 'err');
    return;
  }
  const confirmed = await confirmDialog(
    'Send broadcast?',
    `This will post the embed to ${wantTargets.length} channel${wantTargets.length === 1 ? '' : 's'} across ${new Set(wantTargets.map(t => t.guild_id)).size} server${new Set(wantTargets.map(t => t.guild_id)).size === 1 ? '' : 's'}.`,
    'Send',
    /*okDanger=*/false);
  if (!confirmed) return;

  bcast.sending = true; bcast.lastResults = null; render();
  try {
    const res = await api('/api/dashboard/admin/broadcast', {
      method: 'POST',
      body: JSON.stringify({
        title: bcast.form.title.trim(),
        description: bcast.form.description.trim(),
        color: bcast.form.color,
        footer: bcast.form.footer.trim(),
        url: bcast.form.url.trim(),
        targets: wantTargets.map(t => ({ guild_id: t.guild_id, channel_id: t.selected_channel_id })),
      }),
    });
    // Backend now enqueues the broadcast as a bot-action (202 Accepted)
    // rather than sending synchronously. The actual delivery happens in the
    // bot worker; user watches "Recent bot actions" for the outcome.
    if (res && res.queued) {
      bcast.lastResults = { queued: true, id: res.id, total: res.total };
      toast(`Broadcast queued for ${res.total} channel${res.total === 1 ? '' : 's'} (action #${res.id}). Check Recent bot actions for status.`, 'ok');
      // Refresh the bot-actions table immediately so the new row shows up.
      try { await loadBotActions(); } catch (_) {}
    } else if (res && typeof res.sent === 'number') {
      // Backwards-compat: legacy synchronous response shape.
      bcast.lastResults = res;
      if (res.sent === res.total) {
        toast(`Sent to ${res.sent} channel${res.sent === 1 ? '' : 's'}.`, 'ok');
      } else {
        toast(`Sent ${res.sent}/${res.total}.`, 'warn');
      }
    } else {
      toast('Broadcast submitted.', 'ok');
    }
  } catch (e) {
    handleApiError(e, 'Broadcast failed.');
  } finally {
    bcast.sending = false;
    render();
  }
}

const botctl = {
  cleanup: { loading: false, candidates: null, error: null },
  test: { guildId: '', channelId: '', alertType: 'all', channels: [] },

  { value: 'pager', label: 'Pager' },
];

async function enqueueBotAction(action, params) {
  try {
    const res = await api('/api/dashboard/admin/bot-actions', {
      method: 'POST',
      body: JSON.stringify({ action, params: params || {} }),
    });
    toast(`Queued ${action} (id ${res.id}).`, 'ok');
    await loadBotActions();
  } catch (e) {
    handleApiError(e, `Failed to queue ${action}.`);
  }
}

async function loadBotActions() {
  botctl.actions.loading = true;
  try {
    const res = await api('/api/dashboard/admin/bot-actions');
    botctl.actions.items = res.actions || [];
  } catch (e) {
    // Non-fatal
  } finally {
    botctl.actions.loading = false;
    // Repaint just the actions table, not the whole admin view.
    const host = document.getElementById('botctl-actions-host');
    if (host) { host.innerHTML = ''; host.appendChild(renderBotActionsTable()); }
  }
}

async function loadCleanupCandidates() {
  botctl.cleanup.loading = true; botctl.cleanup.error = null;
  const host = document.getElementById('botctl-cleanup-host');
  if (host) { host.innerHTML = ''; host.appendChild(el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Checking…'])); }

    botctl.cleanup.candidates = res.candidates || [];
  } catch (e) {
    botctl.cleanup.error = (e && e.message) || 'Failed to load candidates.';
  } finally {
    botctl.cleanup.loading = false;
    if (host) { host.innerHTML = ''; host.appendChild(renderCleanupBody()); }

}
