<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NSW PSN – Discord Bot Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Manage alert presets for the NSW PSN Discord bot." />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/fqlogo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://analytics.forcequit.xyz/script.js" data-website-id="32d5fcbf-4330-4223-a341-12b063edf831"></script>
  <style>
    /* -------- Base tokens (mirrored from styles.css on live.html) -------- */
    :root {
      --bg: #05070b;
      --bg-elevated: #10131b;
      --bg-elevated-soft: #151925;
      --border-subtle: rgba(148, 163, 184, 0.35);
      --border-accent: #f97316;
      --accent: #f97316;
      --accent-soft: rgba(249, 115, 22, 0.18);
      --text-main: #f9fafb;
      --text-muted: #a1a5b6;
      --text-soft: #6b7280;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-pill: 999px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.65);
      --discord: #5865f2;
      --ok: #22c55e;
      --warn: #eab308;
      --danger: #ef4444;
      --sidebar-w: 280px;
      --topbar-h: 58px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; max-width: 100vw;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, #111827 0, #020617 52%),
        radial-gradient(circle at bottom right, #020617 0, #020617 65%);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-color: #020617;
      color: var(--text-main);
      line-height: 1.45;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button { font-family: inherit; }

    /* -------- Top bar -------- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      height: var(--topbar-h);
      background: rgba(15, 23, 42, 0.88);
      border-bottom: 1px solid var(--border-subtle);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
    .brand { display: flex; align-items: center; gap: 0.55rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; font-size: 0.9rem; white-space: nowrap; }
    .brand .logo { color: var(--accent); font-size: 1.05rem; }
    .brand a { color: var(--text-main); }
    .topbar-center { flex: 1; display: flex; align-items: center; gap: 0.5rem; justify-content: flex-start; min-width: 0; }
    .topbar-center .guild-select { max-width: 260px; }
    .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
    .hamburger {
      display: none;
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      background: rgba(2,6,23,0.55);
      color: var(--text-main);
      cursor: pointer;
      align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .hamburger:hover { background: rgba(255,255,255,0.06); }

    .user-chip {
      display: inline-flex; align-items: center; gap: 0.55rem;
      padding: 0.25rem 0.65rem 0.25rem 0.3rem;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-pill);
      background: rgba(2, 6, 23, 0.55);
      font-size: 0.82rem;
    }
    .user-chip img { width: 26px; height: 26px; border-radius: 50%; background: #334155; }

    /* -------- Buttons -------- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.55rem 1rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; transition: transform 0.1s, background 0.15s, border-color 0.15s;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:not(:disabled):hover { transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(249,115,22,0.3); }
    .btn-primary:not(:disabled):hover { background: #ea580c; }
    .btn-discord { background: var(--discord); color: #fff; box-shadow: 0 4px 12px rgba(88,101,242,0.35); }
    .btn-discord:not(:disabled):hover { background: #4752c4; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-main); border-color: rgba(255,255,255,0.08); }
    .btn-secondary:not(:disabled):hover { background: rgba(255,255,255,0.12); }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border-subtle); }
    .btn-ghost:not(:disabled):hover { background: rgba(255,255,255,0.06); color: var(--text-main); }
    .btn-danger { background: rgba(239,68,68,0.14); color: #fca5a5; border-color: rgba(239,68,68,0.4); }
    .btn-danger:not(:disabled):hover { background: rgba(239,68,68,0.25); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
    .btn-xs { padding: 0.25rem 0.55rem; font-size: 0.72rem; border-radius: 8px; }
    .btn-block { width: 100%; }

    /* -------- App shell (sidebar + content) -------- */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - var(--topbar-h));
    }

    /* -------- Sidebar -------- */
    .sidebar {
      border-right: 1px solid var(--border-subtle);
      background: rgba(10, 14, 24, 0.7);
      display: flex; flex-direction: column;
      position: sticky; top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
      overflow: hidden;
      z-index: 30;
    }
    .sidebar-head {
      padding: 0.75rem 0.85rem 0.55rem;
      border-bottom: 1px solid rgba(148,163,184,0.18);
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .sidebar-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-soft); font-weight: 600; margin: 0;
    }
    .sidebar-body {
      flex: 1; overflow-y: auto;
      padding: 0.35rem 0.4rem;
    }
    .sidebar-foot {
      padding: 0.7rem 0.8rem 0.9rem;
      border-top: 1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.45);
    }

    /* Guild mute panel */
    .mute-panel {
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 10px;
      background: rgba(2,6,23,0.5);
      padding: 0.55rem 0.65rem;
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .mute-panel-head {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-soft); font-weight: 600;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .mute-banner {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 600;
      padding: 0.25rem 0.5rem; border-radius: 6px;
      margin-left: auto;
    }
    .mute-banner.red { background: rgba(239,68,68,0.18); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
    .mute-banner.amber { background: rgba(234,179,8,0.14); color: #fde68a; border: 1px solid rgba(234,179,8,0.4); }
    .mute-row {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.78rem; color: var(--text-muted);
    }
    .mute-row .mute-label { flex: 1; min-width: 0; }

    /* iOS-ish toggle switch */
    .swx {
      position: relative; display: inline-block;
      width: 34px; height: 18px; flex-shrink: 0;
    }
    .swx input { opacity: 0; width: 0; height: 0; }
    .swx .track {
      position: absolute; cursor: pointer;
      inset: 0;
      background: rgba(148,163,184,0.3);
      border-radius: 999px; transition: 0.15s;
    }
    .swx .track::before {
      content: ''; position: absolute;
      height: 14px; width: 14px; left: 2px; top: 2px;
      background: #fff; border-radius: 50%;
      transition: 0.15s;
    }
    .swx input:checked + .track { background: var(--accent); }
    .swx input:checked + .track::before { transform: translateX(16px); }
    .swx input:disabled + .track { opacity: 0.5; cursor: not-allowed; }
    .swx.small { width: 26px; height: 14px; }
    .swx.small .track::before { height: 10px; width: 10px; }
    .swx.small input:checked + .track::before { transform: translateX(12px); }

    .sb-empty {
      margin: 0.4rem; padding: 0.8rem 0.7rem;
      border: 1px dashed rgba(148,163,184,0.3);
      border-radius: var(--radius-md);
      font-size: 0.8rem; color: var(--text-muted);
      text-align: center;
    }

    /* Sidebar channel rows */
    .sb-ch {
      border-radius: 10px;
      margin: 0.15rem 0.15rem;
      overflow: hidden;
      border: 1px solid transparent;
    }
    .sb-ch.open {
      background: rgba(255,255,255,0.025);
      border-color: rgba(148,163,184,0.18);
    }
    .sb-ch-head {
      display: grid;
      grid-template-columns: 16px minmax(0,1fr) auto auto;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.55rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.88rem;
      outline: none;
    }
    .sb-ch-head:hover { background: rgba(255,255,255,0.035); }
    .sb-ch-head:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); border-radius: 8px; }
    .sb-ch-head .chev {
      color: var(--text-soft);
      font-size: 0.72rem;
      transition: transform 0.18s;
    }
    .sb-ch.open .sb-ch-head .chev { transform: rotate(90deg); }
    .sb-ch-name {
      min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #e5e7eb; font-weight: 500;
    }
    .sb-ch-name .hash { color: var(--text-soft); margin-right: 0.15rem; }
    .sb-ch-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(148,163,184,0.14);
      padding: 0.06rem 0.4rem;
      border-radius: var(--radius-pill);
    }
    .sb-ch-glyph { font-size: 0.78rem; line-height: 1; color: var(--text-soft); }
    .sb-ch-body { display: none; padding: 0.1rem 0.35rem 0.4rem 1.55rem; }
    .sb-ch.open .sb-ch-body { display: block; }

    .sb-ch-mute {
      display: grid;
      grid-template-columns: auto auto;
      gap: 0.15rem 0.75rem;
      padding: 0.35rem 0.5rem 0.5rem;
      margin: 0 0 0.2rem;
      border-bottom: 1px dashed var(--border);
    }
    .sb-ch-mute-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .sb-ch-mute-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sb-preset {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto auto;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .sb-preset:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
    .sb-preset.active {
      background: var(--accent-soft);
      border-color: rgba(249,115,22,0.45);
      color: var(--text-main);
    }
    .sb-preset-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .sb-preset-count {
      font-size: 0.68rem;
      color: var(--text-soft);
      background: rgba(148,163,184,0.1);
      padding: 0.04rem 0.4rem;
      border-radius: var(--radius-pill);
    }
    .sb-preset-state {
      font-size: 0.78rem; line-height: 1;
    }

    /* -------- Content pane -------- */
    .content {
      padding: 1.4rem 1.6rem 3rem;
      min-width: 0;
    }

    .crumb {
      font-size: 0.78rem; color: var(--text-soft);
      margin: 0 0 0.25rem;
      display: flex; align-items: center; flex-wrap: wrap; gap: 0.15rem;
    }
    .crumb .sep { margin: 0 0.35rem; opacity: 0.6; }
    .crumb .crumb-main { color: var(--text-main); }
    .pane-title-row {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      margin: 0 0 1rem;
    }
    .pane-title { font-size: 1.4rem; margin: 0; flex: 1; min-width: 0; }
    .pane-title .hash { color: var(--text-soft); margin-right: 0.2rem; }

    .rename-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin: 0 0 1.1rem;
    }
    .rename-row .form-input {
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 0.7rem;
      flex: 1; min-width: 0; max-width: 380px;
    }

    .section-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-soft); font-weight: 600; margin: 1.2rem 0 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .section-label:first-child { margin-top: 0; }
    .section-label .cap { flex: 1; }
    .section-label .inherit-note {
      font-weight: 500; text-transform: none; letter-spacing: 0;
      color: var(--text-soft); font-size: 0.72rem;
    }

    .card {
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: var(--radius-md);
      background: rgba(2,6,23,0.35);
      padding: 0.9rem 1rem;
    }
    .card-row {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      padding: 0.35rem 0;
    }
    .card-row + .card-row { border-top: 1px dashed rgba(148,163,184,0.14); }
    .card-row .label { flex: 1; min-width: 140px; font-size: 0.85rem; color: var(--text-main); }
    .card-row .sub { display: block; font-size: 0.72rem; color: var(--text-soft); margin-top: 0.1rem; font-weight: 400; }

    /* Chips (alert-type selector) */
    .chip-row {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-subtle);
      background: rgba(2,6,23,0.55);
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .chip:hover { border-color: rgba(249,115,22,0.5); color: var(--text-main); }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .chip.active:hover { background: #ea580c; }
    .chip .mono {
      font-family: 'SF Mono','Consolas',monospace;
      font-size: 0.66rem;
      opacity: 0.7;
    }

    /* Provider-grouped alert-type selector (used by editor + wizard). */
    .provider-list {
      display: flex; flex-direction: column;
      gap: 0.45rem;
    }
    .provider-section {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: rgba(2,6,23,0.45);
      overflow: hidden;
    }
    .provider-section.expanded { border-color: rgba(249,115,22,0.35); }
    .provider-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.85rem;
      color: var(--text-main);
      background: rgba(15,23,42,0.4);
      border: none;
      width: 100%;
      text-align: left;
    }
    .provider-header:hover { background: rgba(30,41,59,0.6); }
    .provider-header .pv-icon {
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(148,163,184,0.12);
    }
    .provider-header .pv-name { font-weight: 600; }
    .provider-header .pv-count {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .provider-header .pv-count.has-selected { color: var(--accent); font-weight: 600; }
    .provider-header .pv-caret {
      font-size: 0.7rem;
      color: var(--text-soft);
      transition: transform 0.15s ease;
    }
    .provider-section.expanded .pv-caret { transform: rotate(90deg); }
    .provider-body {
      padding: 0.55rem 0.8rem 0.7rem;
      border-top: 1px dashed rgba(148,163,184,0.12);
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .provider-toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; color: var(--text-soft);
    }
    .provider-toolbar .link-btn {
      background: none; border: none; padding: 0;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.72rem;
    }
    .provider-toolbar .link-btn:hover { text-decoration: underline; }

    /* Per-type override rows */
    .override-list {
      display: flex; flex-direction: column;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: var(--radius-md);
      background: rgba(2,6,23,0.3);
      overflow: hidden;
    }
    .override-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto auto auto;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.8rem;
      border-bottom: 1px solid rgba(148,163,184,0.1);
      font-size: 0.85rem;
    }
    .override-row:last-child { border-bottom: none; }
    .override-row.inherited {
      background: repeating-linear-gradient(
        -45deg,
        rgba(148,163,184,0.04) 0 6px,
        transparent 6px 12px
      );
    }
    .override-row.inherited .override-name {
      color: var(--text-muted); font-style: italic;
    }
    .override-row .override-name {
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-main); font-weight: 500;
    }
    .override-row .override-mono {
      font-family: 'SF Mono','Consolas',monospace;
      color: var(--text-soft); font-size: 0.7rem;
      margin-left: 0.35rem; font-weight: 400;
    }
    .override-row .mini-toggle {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.72rem; color: var(--text-soft);
    }
    .override-row .mini-toggle.dim .swx .track { opacity: 0.55; }
    .override-reset {
      width: 22px; height: 22px; border-radius: 6px;
      border: 1px solid transparent;
      background: transparent; color: var(--text-soft);
      cursor: pointer; font-size: 0.72rem;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .override-reset:hover { background: rgba(249,115,22,0.14); color: var(--accent); border-color: rgba(249,115,22,0.3); }
    .override-reset:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .override-badge {
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0.08rem 0.45rem; border-radius: var(--radius-pill);
    }
    .override-badge.override-on {
      background: rgba(249,115,22,0.18); color: #fdba74;
      border: 1px solid rgba(249,115,22,0.35);
    }
    .override-badge.inherit-on {
      background: rgba(148,163,184,0.1); color: var(--text-soft);
      border: 1px solid rgba(148,163,184,0.2);
    }

    .pager-capcodes { margin-top: 0.6rem; }
    .pager-capcodes label {
      display: block; font-size: 0.72rem; color: var(--text-soft); margin-bottom: 0.25rem;
    }

    /* Forms */
    .form-select, .form-input, .form-textarea {
      background: rgba(2,6,23,0.65); border: 1px solid var(--border-subtle);
      border-radius: 8px; color: var(--text-main); font-family: inherit;
      padding: 0.5rem 0.65rem; font-size: 0.88rem; transition: border-color 0.15s;
      min-width: 180px;
    }
    .form-select:focus, .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 70px; resize: vertical; width: 100%; min-width: 0; font-family: 'SF Mono','Consolas',monospace; font-size: 0.82rem; }

    /* Filters card — bbox grid */
    .filters-summary { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; font-size: 0.78rem; color: var(--text-soft); }
    .filters-summary .pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.08rem 0.55rem; border-radius: var(--radius-pill);
      background: rgba(88,101,242,0.14); border: 1px solid rgba(88,101,242,0.35);
      color: #c7d2fe; font-size: 0.72rem;
    }
    .filters-toggle {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.15rem 0.55rem; border-radius: var(--radius-pill);
      border: 1px dashed rgba(148,163,184,0.35);
      color: var(--text-muted); font-size: 0.72rem;
      cursor: pointer; background: transparent;
    }
    .filters-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .filters-body { display: grid; gap: 0.7rem; padding-top: 0.6rem; }
    .filters-body .field-label {
      display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-soft); margin-bottom: 0.25rem;
    }
    .bbox-map {
      height: 440px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-top: 0.3rem;
      position: relative;
      background: #0b1220;
    }
    .bbox-map .leaflet-container { height: 100%; width: 100%; background: #0b1220; }
    .bbox-map-hint {
      position: absolute; top: 8px; left: 8px; z-index: 400;
      background: rgba(5,7,11,0.85);
      color: var(--text-main);
      font-size: 0.72rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border-subtle);
      border-radius: 0.4rem;
      pointer-events: none;
    }
    .bbox-map-hint.hidden { display: none; }
    .bbox-map.drawing .leaflet-container { cursor: crosshair; }
    .bbox-map.panning .leaflet-container { cursor: grab; }
    .bbox-coords {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'SF Mono','Consolas',monospace;
      padding: 0.35rem 0.6rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-top: 0;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      margin-top: -1px;
    }
    .bbox-coords .none { color: var(--text-soft); font-style: italic; }
    .bbox-map-actions {
      display: flex; gap: 0.4rem; margin-top: 0.4rem; flex-wrap: wrap;
    }

    .bbox-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 0.4rem;
    }
    .bbox-grid .form-input { min-width: 0; width: 100%; font-family: 'SF Mono','Consolas',monospace; font-size: 0.8rem; }
    .filters-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    /* Role display */
    .role-display {
      display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center;
    }
    .role-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.12rem 0.6rem; border-radius: var(--radius-pill);
      background: rgba(88,101,242,0.14); border: 1px solid rgba(88,101,242,0.35);
      color: #c7d2fe; font-size: 0.74rem;
    }
    .role-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #c7d2fe; }
    .roles-edit {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.15rem 0.6rem; border-radius: var(--radius-pill);
      border: 1px dashed rgba(148,163,184,0.35);
      color: var(--text-muted); font-size: 0.74rem;
      cursor: pointer; background: transparent;
    }
    .roles-edit:hover { border-color: var(--accent); color: var(--accent); }
    .role-display .none { color: var(--text-soft); font-style: italic; font-size: 0.8rem; }

    /* -------- Empty states -------- */
    .big-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      min-height: 55vh;
      padding: 2rem 1.2rem;
      gap: 0.4rem;
    }
    .big-empty .icon {
      font-size: 3rem;
      color: var(--text-soft);
      margin-bottom: 0.4rem;
      filter: drop-shadow(0 2px 8px rgba(249,115,22,0.2));
    }
    .big-empty h2 { margin: 0; font-size: 1.2rem; }
    .big-empty p { color: var(--text-muted); margin: 0.2rem 0 0.8rem; max-width: 420px; font-size: 0.9rem; }

    /* -------- Wizard -------- */
    .wizard {
      max-width: 640px;
      margin: 0 auto;
    }
    .wizard-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .wizard-head h2 { margin: 0; font-size: 1.25rem; }
    .wizard-steps {
      display: flex; gap: 0.4rem; margin: 0.4rem 0 1.2rem;
      font-size: 0.75rem; color: var(--text-soft);
    }
    .wizard-step {
      padding: 0.2rem 0.55rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-subtle);
    }
    .wizard-step.active { color: var(--accent); border-color: rgba(249,115,22,0.5); background: var(--accent-soft); }
    .wizard-step.done { color: var(--ok); border-color: rgba(34,197,94,0.4); }

    .wizard-body {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.2rem 1.3rem;
      box-shadow: var(--shadow-soft);
    }
    .wizard-foot {
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.6rem; margin-top: 1rem;
    }

    .channel-picker, .type-list, .role-list-w {
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 10px;
      background: rgba(2,6,23,0.4);
      padding: 0.3rem;
    }
    .channel-cat-label {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-soft); font-weight: 600;
      padding: 0.6rem 0.55rem 0.25rem;
    }
    .channel-opt, .type-opt, .role-opt-w {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.5rem 0.6rem;
      border-radius: 8px; cursor: pointer; user-select: none;
      font-size: 0.88rem;
    }
    .channel-opt:hover, .type-opt:hover, .role-opt-w:hover { background: rgba(255,255,255,0.05); }
    .channel-opt input, .type-opt input, .role-opt-w input { accent-color: var(--accent); margin: 0; }
    .channel-opt.selected, .type-opt.selected { background: var(--accent-soft); }
    .channel-opt.disabled, .type-opt.disabled, .role-opt-w.disabled { opacity: 0.4; cursor: not-allowed; }
    .channel-opt .hash { color: var(--text-soft); }
    .channel-opt .name { color: #e5e7eb; font-weight: 500; }
    .channel-opt .existing-note { margin-left: auto; font-size: 0.7rem; color: var(--text-soft); font-style: italic; }
    .role-opt-w .swatch { width: 10px; height: 10px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
    .select-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.55rem; font-size: 0.78rem; color: var(--text-soft);
    }
    .select-row .link-btn {
      background: transparent; border: none; color: var(--accent); cursor: pointer;
      font-size: 0.78rem; padding: 0; text-decoration: underline;
    }
    .wizard-search { margin-bottom: 0.6rem; width: 100%; }

    /* -------- Unauth / Login view -------- */
    .auth-wrap {
      min-height: calc(100vh - var(--topbar-h) - 60px);
      display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
    }
    .auth-card {
      max-width: 420px; width: 100%;
      background: var(--bg-elevated); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-soft);
      text-align: center;
    }
    .auth-card h2 { margin: 0.6rem 0 0.3rem; font-size: 1.3rem; }
    .auth-card p { color: var(--text-muted); margin: 0 0 1.4rem; font-size: 0.9rem; }
    .auth-logo { font-size: 2.2rem; color: var(--accent); }

    /* -------- Empty / loading -------- */
    .empty {
      padding: 2rem 1rem; text-align: center; color: var(--text-muted);
      border: 1px dashed rgba(148,163,184,0.3); border-radius: var(--radius-md);
      background: rgba(2,6,23,0.3);
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* -------- Modal -------- */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 1.3rem 1.4rem; width: 100%; max-width: 480px;
      box-shadow: var(--shadow-soft); max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
    }
    .modal-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; }
    .modal h3 { margin: 0; font-size: 1.05rem; }
    .modal .subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.8rem; }
    .modal-roles { flex: 1; overflow-y: auto; border: 1px solid rgba(148,163,184,0.2); border-radius: 10px; background: rgba(2,6,23,0.4); padding: 0.4rem; margin-bottom: 0.8rem; }
    .role-opt {
      display: flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.55rem;
      border-radius: 8px; cursor: pointer; user-select: none;
    }
    .role-opt:hover { background: rgba(255,255,255,0.05); }
    .role-opt input { accent-color: var(--accent); }
    .role-opt .swatch { width: 10px; height: 10px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
    .role-opt.disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-foot { display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; }
    .modal-foot .count { font-size: 0.78rem; color: var(--text-soft); }
    .modal-search { margin-bottom: 0.6rem; }
    .modal-field { margin-bottom: 0.7rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .modal-field label { font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

    /* Confirm modal */
    .confirm-body { color: var(--text-muted); font-size: 0.9rem; margin: 0.2rem 0 1rem; }

    /* -------- Toasts -------- */
    .toasts {
      position: fixed; top: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.5rem;
      z-index: 200; max-width: calc(100vw - 2rem);
    }
    .toast {
      background: var(--bg-elevated); border: 1px solid var(--border-subtle);
      border-left: 4px solid var(--accent);
      padding: 0.65rem 0.9rem; border-radius: 10px; box-shadow: var(--shadow-soft);
      font-size: 0.85rem; min-width: 240px; max-width: 380px;
      animation: toastIn 0.2s ease-out;
    }
    .toast.ok { border-left-color: var(--ok); }
    .toast.err { border-left-color: var(--danger); }
    .toast.warn { border-left-color: var(--warn); }
    @keyframes toastIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* -------- Mobile sidebar drawer -------- */
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      z-index: 45;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .sidebar-backdrop.open { display: block; opacity: 1; }

    .fab {
      display: none;
      position: fixed;
      bottom: 1.1rem; right: 1.1rem;
      z-index: 35;
      border: none;
      background: var(--accent);
      color: #fff;
      width: 56px; height: 56px;
      border-radius: 50%;
      box-shadow: 0 10px 24px rgba(249,115,22,0.45);
      cursor: pointer;
      font-size: 1.4rem;
    }
    .fab:hover { background: #ea580c; }

    /* Desktop: "+ New preset" button in the top-right of content pane */
    .new-preset-btn-top {
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    /* Inheritance caption */
    .inherit-caption {
      font-size: 0.72rem; color: var(--text-soft);
      margin-top: 0.3rem;
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.3rem;
    }
    .inherit-caption .pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.05rem 0.4rem;
      border-radius: 4px;
      background: rgba(148,163,184,0.12);
      color: var(--text-muted);
      font-size: 0.68rem;
    }
    .inherit-caption .pill.muted { background: rgba(239,68,68,0.14); color: #fca5a5; }
    .inherit-caption .pill.pings-off { background: rgba(234,179,8,0.14); color: #fde68a; }

    /* Collapsible (channel mute) */
    .collapse-head {
      display: flex; align-items: center; gap: 0.45rem;
      cursor: pointer; user-select: none;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-soft); font-weight: 600;
      margin: 1.2rem 0 0.5rem;
    }
    .collapse-head .chev { font-size: 0.7rem; transition: transform 0.15s; }
    .collapse-head.open .chev { transform: rotate(90deg); }

    /* Delete button in editor header */
    .editor-actions { display: flex; align-items: center; gap: 0.4rem; }

    /* -------- Responsive: mobile drawer -------- */
    @media (max-width: 1023.98px) {
      .hamburger { display: inline-flex; }
      .shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        top: var(--topbar-h);
        left: 0;
        width: 85%;
        max-width: 340px;
        height: calc(100vh - var(--topbar-h));
        transform: translateX(-100%);
        transition: transform 0.24s ease;
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        background: rgba(10, 14, 24, 0.97);
        z-index: 50;
      }
      .sidebar.open { transform: translateX(0); }
      .content { padding: 1.1rem 1rem 5rem; }
      .fab { display: inline-flex; align-items: center; justify-content: center; }
      .wizard { max-width: 100%; }
      .topbar-center .guild-select { max-width: 50vw; }
    }

    @media (max-width: 540px) {
      .pane-title-row { flex-direction: column; align-items: flex-start; }
      .brand { font-size: 0.75rem; letter-spacing: 0.1em; }
      .topbar-center .guild-select { min-width: 0; max-width: 40vw; font-size: 0.8rem; }
      .override-row { grid-template-columns: minmax(0,1fr) auto; grid-template-rows: auto auto; gap: 0.35rem 0.5rem; }
      .override-row .mini-toggle { justify-self: end; }
    }

    /* -------- Reduced motion -------- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* -------------------- Overview + Admin -------------------- */
    .overview-wrap, .admin-wrap { padding: 1.2rem 1.4rem 2rem; max-width: 1200px; }
    .overview-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin: 0 0 1rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .overview-head h2 { margin: 0; font-size: 1.4rem; color: var(--text-main); }
    .overview-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .overview-mute-banner { margin-bottom: 0.75rem; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.7rem;
      margin: 0.25rem 0 1.5rem;
    }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas: "icon val" "icon label";
      column-gap: 0.75rem; row-gap: 0.15rem;
      align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
      transition: border-color 0.15s, transform 0.15s;
    }
    .stat-card:hover { border-color: rgba(249,115,22,0.45); transform: translateY(-1px); }
    .stat-card > i { grid-area: icon; color: var(--accent); font-size: 1.5rem; width: 1.5rem; text-align: center; }
    .stat-card .stat-val { grid-area: val; font-size: 1.5rem; font-weight: 700; color: var(--text-main); line-height: 1.1; }
    .stat-card .stat-label { grid-area: label; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .section-head {
      margin: 1.25rem 0 0.7rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      font-weight: 600;
    }

    .overview-channels { display: grid; gap: 0.7rem; }
    .ov-ch-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .ov-ch-head {
      display: flex; align-items: center; gap: 0.6rem;
      font-weight: 600;
      padding-bottom: 0.55rem; margin-bottom: 0.55rem;
      border-bottom: 1px dashed var(--border-subtle);
      color: var(--text-main);
    }
    .ov-ch-name { display: flex; align-items: center; gap: 0.1rem; }
    .ov-ch-name .hash { color: var(--text-soft); margin-right: 0.15rem; }
    .ov-ch-count { margin-left: auto; font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }
    .ov-preset-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .ov-preset-chip {
      background: var(--accent-soft);
      border: 1px solid rgba(249,115,22,0.45);
      color: var(--text-main);
      border-radius: var(--radius-pill);
      padding: 0.35rem 0.75rem;
      display: inline-flex; align-items: center; gap: 0.5rem;
      cursor: pointer; font-size: 0.82rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .ov-preset-chip:hover { background: rgba(249,115,22,0.3); border-color: var(--accent); transform: translateY(-1px); }
    .ov-preset-chip.off { opacity: 0.55; background: rgba(120,120,120,0.14); border-color: var(--border-subtle); }
    .ov-preset-types { color: var(--text-soft); font-family: monospace; font-size: 0.72rem; }
    .ov-preset-fires {
      color: var(--text-muted);
      font-size: 0.7rem;
      padding-left: 0.5rem;
      border-left: 1px solid var(--border-subtle);
    }

    .preset-activity {
      display: flex; flex-wrap: wrap; gap: 0.85rem;
      padding: 0.55rem 0.85rem;
      margin: 0.25rem 0 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 0.8rem;
      color: var(--text-main);
    }
    .preset-activity i { color: var(--accent); margin-right: 0.35rem; }

    /* Admin */
    .admin-type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .admin-type-cell {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.55rem 0.85rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-main);
    }
    .admin-type-cell .at-count { font-weight: 700; color: var(--accent); font-size: 1rem; }

    /* Data-source health panel */
    .src-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .src-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.7rem 0.85rem;
      display: grid;
      gap: 0.35rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .src-card-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.6rem;
    }
    .src-label {
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.85rem;
      line-height: 1.2;
    }
    .src-state {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .src-state.ok       { background: rgba(34,197,94,0.15);  color: var(--ok);     border-color: rgba(34,197,94,0.4); }
    .src-state.degraded { background: rgba(234,179,8,0.15);  color: var(--warn);   border-color: rgba(234,179,8,0.45); }
    .src-state.down     { background: rgba(239,68,68,0.18);  color: var(--danger); border-color: rgba(239,68,68,0.5); }
    .src-state.unknown  { background: rgba(148,163,184,0.12); color: var(--text-muted); border-color: var(--border-subtle); }
    .src-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .src-meta-muted { font-style: italic; color: var(--text-soft); }
    .src-totals {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 0.45rem;
      margin-top: 0.35rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .src-totals .src-tot-ok { color: var(--ok); }
    .src-totals .src-tot-fail { color: var(--text-muted); }
    .src-totals .src-tot-fail.has-fail { color: var(--danger); }
    .src-totals .src-tot-sep { color: var(--text-soft); }
    .src-err {

    }

      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th, .admin-table td {

    .admin-table .g-name { font-weight: 500; }

    @media (max-width: 1024px) {
      .overview-wrap, .admin-wrap { padding: 0.9rem 0.8rem 2rem; }

      .bbox-map { height: 360px; }

      .stat-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
      .admin-type-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .ov-ch-card { padding: 0.7rem 0.8rem; }
    }

    /* -------- Mobile refinements (phone-sized) -------- */
    @media (max-width: 700px) {
      /* Topbar: let admin/invite/logout wrap below guild selector instead of pushing it */

      .topbar-left { flex: 0 0 auto; }

      /* bbox map — slightly shorter on phones so it doesn't dominate the card */

      .bbox-map-hint { font-size: 0.68rem; padding: 0.3rem 0.5rem; right: 8px; }
      .bbox-coords { font-size: 0.66rem; padding: 0.3rem 0.5rem; }
      .bbox-map-actions { gap: 0.3rem; }
      .bbox-map-actions .btn { flex: 1 1 0; min-width: 0; justify-content: center; font-size: 0.75rem; padding: 0.35rem 0.5rem; }
      .bbox-map-actions .btn i { margin-right: 0.15rem; }

      /* Overview */
      .overview-wrap, .admin-wrap { padding: 0.75rem 0.6rem 3rem; }
      .overview-head { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding-bottom: 0.65rem; }
      .overview-head h2 { font-size: 1.2rem; }

      .ov-preset-row { gap: 0.3rem; }

      .crumb { font-size: 0.75rem; flex-wrap: wrap; }
      .pane-title .hash { font-size: 0.95rem; }
      .card-row { grid-template-columns: minmax(0, 1fr) auto; }

      /* Sidebar channel mute panel */
      .sb-ch-mute { padding: 0.3rem 0.4rem 0.4rem; }
      .sb-ch-mute-label { font-size: 0.68rem; }

      /* Admin: stack stat grid 2-wide, compact tables */
      .admin-type-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 0.35rem; }
      .admin-type-cell { font-size: 0.78rem; padding: 0.4rem 0.55rem; }

      .admin-table th, .admin-table td { font-size: 0.7rem; padding: 0.35rem 0.4rem; }
      .admin-table .g-id { display: none; }
      .admin-table .g-icon { width: 18px; height: 18px; margin-right: 0.35rem; }

      /* Broadcast composer */
      .broadcast-card { padding: 0.7rem 0.8rem; }
      .broadcast-card textarea { min-height: 90px; font-size: 0.82rem; }

      /* Source health cards */
      .src-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.4rem; }

      /* Confirm + role modal margin */
      .modal { margin: 1rem; max-width: calc(100vw - 2rem); }
    }

    /* Very narrow phones */
    @media (max-width: 400px) {
      .bbox-map { height: 220px; }
      .stat-grid { grid-template-columns: 1fr; }
      .ov-preset-fires { display: none; }
      .admin-type-grid { grid-template-columns: 1fr; }
      .bbox-map-actions .btn { font-size: 0.7rem; padding: 0.3rem 0.4rem; }
      .bbox-map-actions .btn i { display: none; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">

        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="brand">
        <span class="logo"><i class="fa-solid fa-tower-broadcast"></i></span>
        <a href="/">NSW&nbsp;PSN <span style="color:var(--accent)">DASH</span></a>
      </div>
    </div>
    <div class="topbar-center" id="topbar-center">
      <!-- guild selector, filled by JS -->
    </div>
    <div class="topbar-right" id="topbar-right">
      <!-- user chip + logout, filled by JS -->
    </div>
  </header>

  <div id="app-root">
    <div class="empty" style="margin: 2rem"><span class="spinner"></span> Loading…</div>
  </div>

  <!-- Mobile sidebar backdrop -->

  <!-- Floating action button (mobile, when sidebar closed) -->

  </button>

  <!-- Role picker modal -->

        <button class="btn btn-ghost btn-xs" onclick="closeRoleModal()" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="subtitle" id="role-modal-sub">Pick up to 5 roles to ping when these alerts fire.</div>
      <input class="form-input modal-search" id="role-search" placeholder="Search roles…" oninput="renderRoleOptions()" />
      <div class="modal-roles" id="role-options"></div>
      <div class="modal-foot">
        <span class="count" id="role-count">0 / 5 selected</span>
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-ghost btn-sm" onclick="closeRoleModal()">Cancel</button>

      </div>
      <div class="confirm-body" id="confirm-body">This action cannot be undone.</div>
      <div class="modal-foot" style="justify-content: flex-end">
        <button class="btn btn-ghost btn-sm" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

<script>
/* =========================================================
   NSW PSN Dashboard (preset-based)
   Single-file plain JS. No framework. ES2020.
   ========================================================= */

// Backend is on a sibling subdomain. Cookie is Domain=.forcequit.xyz.
const API = 'https://api.forcequit.xyz';
window.API = API;

// Provider-grouped alert type catalog. Keep in sync with discord-bot
// ALERT_TYPES and the data_history `source` values.
const PROVIDERS = [
  { key: 'rfs',         name: 'NSW Rural Fire Service', icon: 'fire',  color: '#ef4444',
    types: [
      { key: 'rfs', label: 'Major Incidents' },
    ] },
  { key: 'bom',         name: 'Bureau of Meteorology',  icon: 'cloud', color: '#3b82f6',
    types: [
      { key: 'bom_land',   label: 'Land Warnings' },
      { key: 'bom_marine', label: 'Marine Warnings' },
    ] },
  { key: 'livetraffic', name: 'LiveTraffic NSW',        icon: 'road',  color: '#f97316',
    types: [
      { key: 'traffic_incident',   label: 'Incidents' },
      { key: 'traffic_roadwork',   label: 'Roadwork' },
      { key: 'traffic_flood',      label: 'Flooding' },
      { key: 'traffic_fire',       label: 'Fires' },
      { key: 'traffic_majorevent', label: 'Major Events' },
    ] },
  { key: 'endeavour',   name: 'Endeavour Energy',       icon: 'bolt',  color: '#fbbf24',
    types: [
      { key: 'endeavour_current', label: 'Current Outages' },
      { key: 'endeavour_planned', label: 'Planned Outages' },
    ] },
  { key: 'ausgrid',     name: 'Ausgrid',                icon: 'plug',  color: '#f59e0b',
    types: [
      { key: 'ausgrid', label: 'Outages' },
    ] },
  { key: 'essential',   name: 'Essential Energy',       icon: 'bolt',  color: '#06b6d4',
    types: [
      { key: 'essential_planned', label: 'Planned Outages' },
      { key: 'essential_future',  label: 'Future Outages' },
    ] },
  { key: 'waze',        name: 'Waze',                   icon: 'car',   color: '#00d4ff',
    types: [
      { key: 'waze_hazard',   label: 'Hazards' },
      { key: 'waze_jam',      label: 'Traffic Jams' },
      { key: 'waze_police',   label: 'Police' },
      { key: 'waze_roadwork', label: 'Roadwork' },
    ] },
  { key: 'user',        name: 'User Submissions',       icon: 'user',  color: '#a855f7',
    types: [
      { key: 'user_incident', label: 'User Incidents' },
    ] },
  { key: 'rdio',        name: 'Radio Scanner',          icon: 'radio', color: '#10b981',
    types: [
      { key: 'radio_summary', label: 'Hourly Summaries' },
    ] },
];

const ALERT_TYPES = PROVIDERS.flatMap(p => p.types.map(t => t.key));
const _DASH_ALERT_TYPES = ALERT_TYPES;
const ALERT_TYPE_LABELS = Object.fromEntries(
  PROVIDERS.flatMap(p => p.types.map(t => [t.key, t.label]))
);
const MOBILE_BREAKPOINT = 1024;
const MAX_ROLES = 5;

const state = {
  user: null,
  guilds: [],
  activeGuildId: null,
  channels: [],
  roles: [],
  presets: [],
  muteState: { guild: { enabled: true, enabled_ping: true }, channels: new Map() },
  presetStats: new Map(),    // preset_id (str) -> { fires_7d, fires_30d, last_fire }
  selectedPresetId: null,
  openChannels: new Set(),
  loadingGuild: false,
  view: 'editor',          // 'editor' | 'wizard' | 'empty' | 'admin'
  drawerOpen: false,
  deepLinkChannelId: null,
  wizard: null,
  admin: null,             // { loading, data, error }
};

/* -------------------- Utilities -------------------- */

function qs(id) { return document.getElementById(id); }
function el(tag, attrs, children) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'for') n.htmlFor = attrs[k];
    else if (attrs[k] === false || attrs[k] == null) { /* skip */ }
    else n.setAttribute(k, attrs[k]);
  }
  if (children != null) {
    if (!Array.isArray(children)) children = [children];
    for (const c of children) {
      if (c == null || c === false) continue;
      n.appendChild(typeof c === 'string' || typeof c === 'number'
        ? document.createTextNode(String(c))
        : c);
    }
  }
  return n;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function getQuery() {
  const p = new URLSearchParams(window.location.search);
  return { guild: p.get('guild'), channel: p.get('channel'), preset: p.get('preset') };
}

function setQueryGuild(gid) {
  const url = new URL(window.location.href);
  if (gid) url.searchParams.set('guild', gid); else url.searchParams.delete('guild');
  url.searchParams.delete('channel');
  url.searchParams.delete('preset');
  window.history.replaceState({}, '', url);
}

function isMobile() {
  return window.innerWidth < MOBILE_BREAKPOINT;
}

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) },
    ...opts,
  });
  if (res.status === 204) return null;
  let body = null;
  try { body = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error((body && body.error) || `HTTP ${res.status}`);
    err.status = res.status; err.body = body;
    throw err;
  }
  return body;
}

/* -------------------- Toasts -------------------- */

function toast(msg, kind='info') {
  const t = el('div', { class: `toast ${kind}` }, msg);
  qs('toasts').appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s, transform 0.3s';
    t.style.opacity = '0';
    t.style.transform = 'translateX(30px)';
    setTimeout(() => t.remove(), 320);
  }, 5000);
}

function handleApiError(e, fallback) {
  if (e && e.status === 401) {
    state.user = null;
    render();
    return;
  }
  if (e && e.status === 403) {
    toast('You need Manage Channels permission in this guild.', 'err');
    return;
  }
  if (e && e.status === 409) {
    toast((e.body && e.body.error) || 'Name conflict.', 'err');
    return;
  }
  if (e && e.status >= 500) {
    toast('Backend error, try again.', 'err');
    return;
  }
  toast((e && e.message) || fallback || 'Request failed', 'err');
}

/* -------------------- Confirm dialog -------------------- */

function confirmDialog(title, body, okLabel='Confirm', okDanger=true) {
  return new Promise((resolve) => {
    qs('confirm-title').textContent = title;
    qs('confirm-body').textContent = body;
    const okBtn = qs('confirm-ok');
    okBtn.textContent = okLabel;
    okBtn.className = okDanger ? 'btn btn-danger btn-sm' : 'btn btn-primary btn-sm';
    const modal = qs('confirm-modal');
    const cleanup = () => {
      modal.classList.remove('open');
      okBtn.onclick = null;
      qs('confirm-cancel').onclick = null;
    };
    okBtn.onclick = () => { cleanup(); resolve(true); };
    qs('confirm-cancel').onclick = () => { cleanup(); resolve(false); };
    modal.classList.add('open');
  });
}

/* -------------------- Bootstrap -------------------- */

async function bootstrap() {
  try {
    const me = await api('/api/dashboard/me');
    state.user = me.user;
    state.guilds = me.guilds || [];
    state.botInviteUrl = me.bot_invite_url || null;
  } catch (e) {
    if (e.status === 401) {
      state.user = null;
      render();
      return;
    }
    handleApiError(e, 'Failed to load user.');
    render();
    return;
  }

  const q = getQuery();
  const preferredGuild = q.guild && state.guilds.find(g => g.id === q.guild && g.has_bot && g.manage_channels);
  const firstEligible = state.guilds.find(g => g.has_bot && g.manage_channels);
  const pick = preferredGuild || firstEligible;
  state.deepLinkChannelId = q.channel || null;

  render();

  if (pick) {
    await selectGuild(pick.id, /*fromBoot=*/true, q.preset || null);
  } else {
    render();
  }
}

async function selectGuild(gid, fromBoot=false, deepLinkPresetId=null) {
  state.activeGuildId = gid;
  state.channels = [];
  state.roles = [];
  state.presets = [];
  state.muteState = { guild: { enabled: true, enabled_ping: true }, channels: new Map() };
  state.presetStats = new Map();
  state.openChannels = new Set();
  state.selectedPresetId = null;
  state.view = 'editor';
  state.wizard = null;
  state.loadingGuild = true;
  if (!fromBoot) setQueryGuild(gid);
  render();

  try {
    const [channels, roles, presetsRes, muteRes, statsRes] = await Promise.all([
      api(`/api/dashboard/guilds/${gid}/channels`),
      api(`/api/dashboard/guilds/${gid}/roles`),
      api(`/api/dashboard/guilds/${gid}/presets`),
      api(`/api/dashboard/guilds/${gid}/mute-state`),
      api(`/api/dashboard/guilds/${gid}/preset-stats`).catch(() => ({ stats: [] })),
    ]);
    state.channels = channels || [];
    state.roles = roles || [];
    state.presets = (presetsRes && presetsRes.presets) || [];
    ingestMuteState(muteRes);
    ingestPresetStats(statsRes);
    state.loadingGuild = false;

    if (deepLinkPresetId) {
      const target = state.presets.find(p => String(p.id) === String(deepLinkPresetId));
      if (target) {
        state.selectedPresetId = target.id;
        state.openChannels.add(target.channel_id);
        state.view = 'editor';
      }
    } else if (state.deepLinkChannelId) {
      const firstInChan = state.presets.find(p => p.channel_id === state.deepLinkChannelId);
      if (firstInChan) {
        state.selectedPresetId = firstInChan.id;
        state.openChannels.add(firstInChan.channel_id);
        state.view = 'editor';
      }
    }

    // Default landing: overview (not a specific preset). If there are no
    // presets at all, the overview component itself renders the empty state.
    if (state.view !== 'editor') {
      state.view = 'overview';
      state.selectedPresetId = null;
    }

    render();
  } catch (e) {
    state.loadingGuild = false;
    handleApiError(e, 'Failed to load guild.');
    render();
  }
}

function ingestMuteState(res) {
  const g = (res && res.guild) || { enabled: true, enabled_ping: true };
  const channels = new Map();
  if (res && Array.isArray(res.channels)) {
    for (const row of res.channels) {
      channels.set(String(row.channel_id), {
        channel_id: String(row.channel_id),
        enabled: !!row.enabled,
        enabled_ping: !!row.enabled_ping,
      });
    }
  }
  state.muteState = {
    guild: { enabled: !!g.enabled, enabled_ping: !!g.enabled_ping },
    channels,
  };
}

function ingestPresetStats(res) {
  const map = new Map();
  const list = (res && res.stats) || [];
  for (const s of list) {
    map.set(String(s.preset_id), {
      fires_7d: Number(s.fires_7d) || 0,
      fires_30d: Number(s.fires_30d) || 0,
      last_fire: s.last_fire || null,
    });
  }
  state.presetStats = map;
}

function presetFires(presetId) {
  return state.presetStats.get(String(presetId)) || { fires_7d: 0, fires_30d: 0, last_fire: null };
}

/* -------------------- Selectors -------------------- */

function channelById(id) { return state.channels.find(c => String(c.id) === String(id)) || null; }

function presetById(id) { return state.presets.find(p => String(p.id) === String(id)) || null; }

function sortedChannels() {
  return [...state.channels].sort((a, b) => {
    const pa = a.position ?? 0, pb = b.position ?? 0;
    return pa - pb || (a.name||'').localeCompare(b.name||'');
  });
}

function sortedPresets() {
  // Sort by channel order, then by preset name
  const chOrder = new Map();
  sortedChannels().forEach((c, i) => chOrder.set(String(c.id), i));
  return [...state.presets].sort((a, b) => {
    const ai = chOrder.has(String(a.channel_id)) ? chOrder.get(String(a.channel_id)) : 9999;
    const bi = chOrder.has(String(b.channel_id)) ? chOrder.get(String(b.channel_id)) : 9999;
    if (ai !== bi) return ai - bi;
    return (a.name||'').localeCompare(b.name||'');
  });
}

function presetsByChannel(chId) {
  return state.presets
    .filter(p => String(p.channel_id) === String(chId))
    .sort((a, b) => (a.name||'').localeCompare(b.name||''));
}

function configuredChannelIds() {
  const s = new Set(state.presets.map(p => String(p.channel_id)));
  const valid = new Set(state.channels.map(c => String(c.id)));
  return Array.from(s).filter(id => valid.has(id));
}

function channelMute(chId) {
  const m = state.muteState.channels.get(String(chId));
  if (m) return m;
  return { channel_id: String(chId), enabled: true, enabled_ping: true };
}

/**
 * Compute effective state for a preset / type-override.
 * Tiers stack: guild AND channel AND preset [AND type-override].
 */
function effectiveState(presetId, alertType=null) {
  const preset = presetById(presetId);
  if (!preset) return { enabled: false, enabled_ping: false };
  const g = state.muteState.guild;
  const c = channelMute(preset.channel_id);
  const ov = alertType && preset.type_overrides && preset.type_overrides[alertType];
  const pEnabled = !!preset.enabled;
  const pPing = !!preset.enabled_ping;
  const oEnabled = ov ? (ov.enabled != null ? !!ov.enabled : pEnabled) : pEnabled;
  const oPing = ov ? (ov.enabled_ping != null ? !!ov.enabled_ping : pPing) : pPing;
  return {
    enabled: !!g.enabled && !!c.enabled && (alertType ? oEnabled : pEnabled),
    enabled_ping: !!g.enabled_ping && !!c.enabled_ping && (alertType ? oPing : pPing),
  };
}

function effectiveGlyph(eff) {
  if (!eff.enabled) return '🔇';
  if (!eff.enabled_ping) return '🔕';
  return '🟢';
}

function effectiveGlyphTitle(eff) {
  if (!eff.enabled) return 'Silenced';
  if (!eff.enabled_ping) return 'Active, no pings';
  return 'Active + pings';
}

function parseRoleIds(arr) {
  if (!arr) return [];
  if (Array.isArray(arr)) return arr.map(String);
  // Defensive: handle legacy comma string too
  return String(arr).split(',').map(s => s.trim()).filter(Boolean);
}

function discordColorToHex(color) {
  const n = Number(color || 0);
  if (!n) return '#94a3b8';
  return '#' + n.toString(16).padStart(6, '0');
}

/* -------------------- Render (dispatch) -------------------- */

function render() {
  renderTopbar();
  const root = qs('app-root');
  if (!state.user) {
    root.innerHTML = '';
    root.appendChild(renderAuthCard());
    return;
  }
  root.innerHTML = '';
  root.appendChild(renderShell());
  syncDrawer();
}

function renderTopbar() {
  const center = qs('topbar-center');
  const right = qs('topbar-right');
  center.innerHTML = '';
  right.innerHTML = '';

  if (!state.user) return;

  const eligible = (state.guilds || []).filter(g => g.has_bot && g.manage_channels);
  if (eligible.length > 0) {
    const sel = el('select', {
      class: 'form-select guild-select',
      id: 'guild-select',
      'aria-label': 'Guild',
      onchange: (e) => selectGuild(e.target.value),
    });
    for (const g of eligible) sel.appendChild(el('option', { value: g.id }, g.name));
    if (state.activeGuildId) sel.value = state.activeGuildId;
    center.appendChild(sel);

    const ovBtn = el('button', {
      class: 'btn btn-ghost btn-sm' + (state.view === 'overview' ? ' active' : ''),
      title: 'Server overview',
      onclick: () => openOverview(),
    }, [el('i', { class: 'fa-solid fa-chart-simple' }), ' Overview']);
    center.appendChild(ovBtn);
  }

  if (state.botInviteUrl) {
    const inv = el('a', {
      class: 'btn btn-ghost btn-sm',
      href: state.botInviteUrl,
      target: '_blank',
      rel: 'noopener',
      title: 'Add the bot to another server',
    }, [el('i', { class: 'fa-solid fa-plus' }), ' Invite bot']);
    right.appendChild(inv);
  }

  const avatar = state.user.avatar_url
    || `https://cdn.discordapp.com/embed/avatars/${(parseInt(state.user.id||'0')>>22)%6}.png`;
  const chip = document.createElement('div');
  chip.className = 'user-chip';
  chip.innerHTML = `<img src="${escapeHtml(avatar)}" alt="" onerror="this.style.visibility='hidden'"/><span>@${escapeHtml(state.user.username||'user')}</span>`;

  if (state.user.is_admin) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'btn btn-ghost btn-sm' + (state.view === 'admin' ? ' active' : '');
    adminBtn.innerHTML = state.view === 'admin'
      ? '<i class="fa-solid fa-arrow-left"></i> Back'
      : '<i class="fa-solid fa-shield-halved"></i> Admin';
    adminBtn.onclick = () => {
      if (state.view === 'admin') {
        stopAdminSourcesAutoRefresh();
        state.view = state.selectedPresetId ? 'editor' : 'empty';
        render();
      } else {
        openAdmin();
      }
    };
    right.appendChild(adminBtn);
  }

  const logout = document.createElement('button');
  logout.className = 'btn btn-ghost btn-sm';
  logout.innerHTML = '<i class="fa-solid fa-right-from-bracket"></i> Logout';
  logout.onclick = async () => {
    try { await api('/api/dashboard/auth/logout', { method: 'POST' }); } catch(e) {}
    state.user = null; state.guilds = []; state.activeGuildId = null;
    render();
  };
  right.appendChild(chip);
  right.appendChild(logout);
}

function renderAuthCard() {
  const next = encodeURIComponent(window.location.pathname + window.location.search);
  const wrap = el('div', { class: 'auth-wrap' });
  const card = el('div', { class: 'auth-card' });
  card.innerHTML = `
    <div class="auth-logo"><i class="fa-brands fa-discord"></i></div>
    <h2>NSW PSN Dashboard</h2>
    <p>Sign in with Discord to manage alert presets for any server where you have <strong>Manage Channels</strong>.</p>
    <a class="btn btn-discord" href="${API}/api/dashboard/auth/login?next=${next}">
      <i class="fa-brands fa-discord"></i> Login with Discord
    </a>
  `;
  wrap.appendChild(card);
  return wrap;
}

function renderShell() {
  const eligible = (state.guilds || []).filter(g => g.has_bot && g.manage_channels);
  if (eligible.length === 0) {
    const wrap = el('div', { style: 'padding: 2rem 1.4rem' }, [
      el('div', { class: 'empty' },
        'You have no servers where the NSW PSN bot is installed and you hold Manage Channels. Ask an admin to invite the bot, or contact support.'),
    ]);
    return wrap;
  }
  const shell = el('div', { class: 'shell' });
  shell.appendChild(renderSidebar());
  shell.appendChild(renderContentPane());
  return shell;
}

/* -------------------- Sidebar -------------------- */

function renderSidebar() {
  const aside = el('aside', { class: 'sidebar' + (state.drawerOpen ? ' open' : ''), id: 'sidebar' });

  const head = el('div', { class: 'sidebar-head' });
  head.appendChild(renderGuildMutePanel());
  head.appendChild(el('p', { class: 'sidebar-title' }, 'Channels'));
  aside.appendChild(head);

  const body = el('div', { class: 'sidebar-body', id: 'sidebar-body' });

  if (state.loadingGuild) {
    body.appendChild(el('div', { class: 'sb-empty' }, [el('span', { class: 'spinner' }), ' Loading…']));
  } else {
    const cfgIds = new Set(configuredChannelIds());
    const rows = sortedChannels().filter(ch => cfgIds.has(String(ch.id)));
    if (rows.length === 0) {
      body.appendChild(el('div', { class: 'sb-empty' }, 'No presets yet. Use “+ New preset” below.'));
    } else {
      for (const ch of rows) body.appendChild(renderSidebarChannelRow(ch));
    }
  }
  aside.appendChild(body);

  const foot = el('div', { class: 'sidebar-foot' }, [
    el('button', {
      class: 'btn btn-primary btn-block',
      onclick: () => openWizard(),
    }, [el('i', { class: 'fa-solid fa-plus' }), ' New preset']),
  ]);
  aside.appendChild(foot);

  return aside;
}

function renderGuildMutePanel() {
  const g = state.muteState.guild;
  const banner = !g.enabled
    ? el('span', { class: 'mute-banner red' }, [el('i', { class: 'fa-solid fa-volume-xmark' }), ' Muted'])
    : (!g.enabled_ping
      ? el('span', { class: 'mute-banner amber' }, [el('i', { class: 'fa-solid fa-bell-slash' }), ' Pings off'])
      : null);

  const head = el('div', { class: 'mute-panel-head' }, [
    el('i', { class: 'fa-solid fa-shield-halved' }),
    el('span', {}, 'Guild'),
    banner,
  ]);

  const row1 = el('div', { class: 'mute-row' }, [
    el('span', { class: 'mute-label' }, 'Alerts'),
    makeSwitch(!!g.enabled, (checked) => setGuildMute({ enabled: checked }), 'On: alerts fire. Off: every preset in this guild is silent.'),
  ]);
  const row2 = el('div', { class: 'mute-row' }, [
    el('span', { class: 'mute-label' }, 'Role pings'),
    makeSwitch(!!g.enabled_ping, (checked) => setGuildMute({ enabled_ping: checked }), 'On: role mentions included. Off: alerts post with no pings.'),
  ]);

  return el('div', { class: 'mute-panel' }, [head, row1, row2]);
}

function makeSwitch(checked, onchange, title, opts={}) {
  const id = 'sw-' + Math.random().toString(36).slice(2, 8);
  const input = el('input', { type: 'checkbox', id, title: title || false });
  input.checked = !!checked;
  if (opts.disabled) input.disabled = true;
  input.addEventListener('change', () => onchange(input.checked));
  const track = el('span', { class: 'track' });
  const lbl = el('label', { class: 'swx' + (opts.small ? ' small' : ''), for: id, title: title || false });
  lbl.appendChild(input);
  lbl.appendChild(track);
  return lbl;
}

function renderSidebarChannelRow(ch) {
  const presets = presetsByChannel(ch.id);
  const open = state.openChannels.has(String(ch.id));
  const cm = channelMute(ch.id);
  const muteGlyph = !cm.enabled ? '🔇' : (!cm.enabled_ping ? '🔕' : '');

  const row = el('div', { class: 'sb-ch' + (open ? ' open' : '') });

  const head = el('div', {
    class: 'sb-ch-head',
    role: 'button',
    tabindex: '0',
    'aria-expanded': open ? 'true' : 'false',
    'aria-label': `Channel ${ch.name}`,
    onclick: () => toggleChannelOpen(ch.id),
    onkeydown: (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleChannelOpen(ch.id);
      } else if (e.key === 'ArrowRight' && !open) {
        e.preventDefault();
        state.openChannels.add(String(ch.id)); render();
      } else if (e.key === 'ArrowLeft' && open) {
        e.preventDefault();
        state.openChannels.delete(String(ch.id)); render();
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        moveSidebarFocus(e.key === 'ArrowDown' ? 1 : -1);
      }
    },
  }, [
    el('span', { class: 'chev' }, el('i', { class: 'fa-solid fa-chevron-right' })),
    el('span', { class: 'sb-ch-name' }, [
      el('span', { class: 'hash' }, '#'),
      ch.name || '(unnamed)',
    ]),
    el('span', { class: 'sb-ch-count', title: `${presets.length} preset${presets.length===1?'':'s'}` }, `${presets.length}`),
    muteGlyph ? el('span', { class: 'sb-ch-glyph', title: !cm.enabled ? 'Channel muted' : 'Channel pings off' }, muteGlyph) : null,
  ]);
  row.appendChild(head);

  const body = el('div', { class: 'sb-ch-body' });
  body.appendChild(renderSidebarChannelMute(ch.id));
  for (const p of presets) {
    const active = String(state.selectedPresetId) === String(p.id) && state.view === 'editor';
    const eff = effectiveState(p.id);
    const typeCount = (p.alert_types || []).length + (p.pager_enabled ? 1 : 0);
    const sub = el('div', {
      class: 'sb-preset' + (active ? ' active' : ''),
      title: effectiveGlyphTitle(eff),
      onclick: (e) => {
        e.stopPropagation();
        selectPreset(p.id);
      },
    }, [
      el('span', { class: 'sb-preset-name' }, p.name || '(unnamed)'),
      el('span', { class: 'sb-preset-count' }, String(typeCount)),
      el('span', { class: 'sb-preset-state' }, effectiveGlyph(eff)),
    ]);
    body.appendChild(sub);
  }
  row.appendChild(body);
  return row;
}

function toggleChannelOpen(chId) {
  const key = String(chId);
  if (state.openChannels.has(key)) state.openChannels.delete(key);
  else state.openChannels.add(key);
  render();
}

function moveSidebarFocus(dir) {
  const heads = Array.from(document.querySelectorAll('.sb-ch-head'));
  const idx = heads.indexOf(document.activeElement);
  const next = heads[Math.max(0, Math.min(heads.length - 1, idx + dir))];
  if (next) next.focus();
}

function selectPreset(pid) {
  state.selectedPresetId = pid;
  state.view = 'editor';
  state.wizard = null;
  const p = presetById(pid);
  if (p) state.openChannels.add(String(p.channel_id));
  if (isMobile()) state.drawerOpen = false;
  render();
}

/* -------------------- Content pane -------------------- */

function renderContentPane() {
  const pane = el('main', { class: 'content', id: 'content' });
  if (state.loadingGuild) {
    pane.appendChild(el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Loading guild…']));
    return pane;
  }
  if (state.view === 'wizard') {
    pane.appendChild(renderWizard());
    return pane;
  }
  if (state.view === 'admin') {
    pane.appendChild(renderAdmin());
    return pane;
  }
  if (state.view === 'overview' || state.view === 'empty' || state.presets.length === 0) {
    pane.appendChild(renderOverview());
    return pane;
  }
  if (!state.selectedPresetId) {
    pane.appendChild(renderOverview());
    return pane;
  }
  const preset = presetById(state.selectedPresetId);
  if (!preset) {
    // stale selection
    state.selectedPresetId = null;
    pane.appendChild(renderPickPrompt());
    return pane;
  }
  pane.appendChild(renderPresetEditor(preset));
  return pane;
}

function openOverview() {
  state.view = 'overview';
  state.selectedPresetId = null;
  if (isMobile()) state.drawerOpen = false;
  render();
}

function renderOverview() {
  const guild = state.guilds.find(g => g.id === state.activeGuildId);
  const guildName = guild ? guild.name : 'this server';
  const presetCount = state.presets.length;
  const chanCount = new Set(state.presets.map(p => String(p.channel_id))).size;
  const pagerCount = state.presets.filter(p => p.pager_enabled).length;
  const mutedCount = state.presets.filter(p => !p.enabled).length;

  if (presetCount === 0) {
    return el('div', { class: 'big-empty' }, [
      el('div', { class: 'icon' }, el('i', { class: 'fa-solid fa-inbox' })),
      el('h2', {}, `No alerts configured in ${guildName}`),
      el('p', {},
        'A preset is a named bundle of alert types that post to one channel. Create your first one to get started.'),
      el('button', { class: 'btn btn-primary', onclick: () => openWizard() },
        [el('i', { class: 'fa-solid fa-plus' }), ' Create first preset']),
    ]);
  }

  const wrap = el('div', { class: 'overview-wrap' });
  wrap.appendChild(el('div', { class: 'overview-head' }, [
    el('h2', {}, guildName),
    el('div', { class: 'overview-actions' }, [
      el('button', { class: 'btn btn-primary btn-sm', onclick: () => openWizard() },
        [el('i', { class: 'fa-solid fa-plus' }), ' New preset']),
    ]),
  ]));

  const gm = state.muteState.guild;
  const mutePill = !gm.enabled
    ? el('span', { class: 'pill muted' }, 'Guild muted')
    : (!gm.enabled_ping ? el('span', { class: 'pill pings-off' }, 'Guild pings off') : null);
  if (mutePill) wrap.appendChild(el('div', { class: 'overview-mute-banner' }, mutePill));

  const cards = el('div', { class: 'stat-grid' });
  cards.appendChild(statCard('Presets', presetCount, 'fa-layer-group'));
  cards.appendChild(statCard('Channels', chanCount, 'fa-hashtag'));
  cards.appendChild(statCard('Pager subs', pagerCount, 'fa-pager'));
  cards.appendChild(statCard('Muted', mutedCount, 'fa-volume-xmark'));
  wrap.appendChild(cards);

  // Channel list
  wrap.appendChild(el('h3', { class: 'section-head' }, 'Channels'));
  const list = el('div', { class: 'overview-channels' });
  const byChannel = new Map();
  for (const p of state.presets) {
    const k = String(p.channel_id);
    if (!byChannel.has(k)) byChannel.set(k, []);
    byChannel.get(k).push(p);
  }
  const chans = [...byChannel.keys()].map(cid => {
    const ch = channelById(cid);
    return { id: cid, name: ch ? ch.name : cid, presets: byChannel.get(cid) };
  });
  chans.sort((a, b) => a.name.localeCompare(b.name));

  for (const row of chans) {
    const cm = channelMute(row.id);
    const card = el('div', { class: 'ov-ch-card' });
    const head = el('div', { class: 'ov-ch-head' }, [
      el('span', { class: 'ov-ch-name' }, [el('span', { class: 'hash' }, '#'), row.name]),
      !cm.enabled ? el('span', { class: 'pill muted' }, 'muted') :
        (!cm.enabled_ping ? el('span', { class: 'pill pings-off' }, 'pings off') : null),
      el('span', { class: 'ov-ch-count' }, `${row.presets.length} preset${row.presets.length === 1 ? '' : 's'}`),
    ]);
    card.appendChild(head);
    const presetsRow = el('div', { class: 'ov-preset-row' });
    for (const p of row.presets) {
      const s = presetFires(p.id);
      const statText = s.last_fire
        ? `${s.fires_7d} in 7d · ${timeAgo(s.last_fire)} ago`
        : 'no fires yet';
      const chip = el('button', {
        class: 'ov-preset-chip' + (!p.enabled ? ' off' : ''),
        onclick: () => selectPreset(p.id),
        title: `${p.name} — ${statText}`,
      }, [
        el('span', { class: 'ov-preset-name' }, p.name),
        el('span', { class: 'ov-preset-types' },
          `${(p.alert_types||[]).length}${p.pager_enabled ? '+p' : ''}`),
        el('span', { class: 'ov-preset-fires' },
          s.last_fire ? `${s.fires_7d}· ${timeAgo(s.last_fire)}` : '—'),
      ]);
      presetsRow.appendChild(chip);
    }
    card.appendChild(presetsRow);
    list.appendChild(card);
  }
  wrap.appendChild(list);
  return wrap;
}

function statCard(label, value, icon) {
  return el('div', { class: 'stat-card' }, [
    el('i', { class: 'fa-solid ' + icon }),
    el('div', { class: 'stat-val' }, String(value)),
    el('div', { class: 'stat-label' }, label),
  ]);
}

function renderPickPrompt() {
  return el('div', { class: 'big-empty' }, [
    el('div', { class: 'icon' }, el('i', { class: 'fa-regular fa-hand-pointer' })),
    el('h2', {}, 'Select a preset'),
    el('p', {}, 'Pick a preset from the list on the left to edit it.'),
    el('button', { class: 'btn btn-primary', onclick: () => openWizard() },
      [el('i', { class: 'fa-solid fa-plus' }), ' New preset']),
  ]);
}

/* -------------------- Preset editor -------------------- */

function renderPresetEditor(preset) {
  const ch = channelById(preset.channel_id);
  const guild = state.guilds.find(g => g.id === state.activeGuildId);
  const wrap = el('div', { class: 'editor', id: 'editor-' + preset.id });

  // Breadcrumb
  wrap.appendChild(el('div', { class: 'crumb' }, [
    el('span', {}, guild ? guild.name : ''),
    el('span', { class: 'sep' }, '/'),
    el('span', {}, '#' + (ch ? ch.name : '(unknown)')),
    el('span', { class: 'sep' }, '/'),
    el('span', { class: 'crumb-main' }, preset.name || '(unnamed)'),
  ]));

  // Title row: button to open new preset modal + delete button
  wrap.appendChild(el('div', { class: 'pane-title-row' }, [
    el('h1', { class: 'pane-title' }, [
      el('span', { class: 'hash' }, '#'),
      (ch ? ch.name : 'channel'),
      el('span', { style: 'color:var(--text-soft);font-weight:400' }, ' · '),
      el('span', { style: 'font-size:1.05rem' }, preset.name || '(unnamed)'),
    ]),
    el('div', { class: 'editor-actions' }, [
      el('button', {
        class: 'btn btn-ghost btn-sm new-preset-btn-top',
        onclick: () => openWizard(preset.channel_id),
      }, [el('i', { class: 'fa-solid fa-plus' }), ' New preset']),
      el('button', {
        class: 'btn btn-danger btn-sm',
        onclick: () => deletePreset(preset.id),
      }, [el('i', { class: 'fa-solid fa-trash' }), ' Delete']),
    ]),
  ]));

  // Activity summary (fires last 7/30d + last fire)
  (() => {
    const s = presetFires(preset.id);
    const parts = [
      el('span', {}, [el('i', { class: 'fa-solid fa-fire' }), ` ${s.fires_7d} in last 7d`]),
      el('span', { style: 'color:var(--text-soft)' }, `${s.fires_30d} in last 30d`),
      el('span', {}, s.last_fire
        ? [el('i', { class: 'fa-regular fa-clock' }), ` last fire ${timeAgo(s.last_fire)} ago`]
        : [el('i', { class: 'fa-regular fa-clock' }), ' never fired']),
    ];
    wrap.appendChild(el('div', { class: 'preset-activity' }, parts));
  })();

  // Rename row (inline)
  const renameInput = el('input', {
    class: 'form-input',
    value: preset.name || '',
    placeholder: 'Preset name',
    maxlength: '100',
    onblur: (e) => {
      const v = (e.target.value || '').trim();
      if (!v) { e.target.value = preset.name || ''; return; }
      if (v === preset.name) return;
      renamePreset(preset.id, v);
    },
    onkeydown: (e) => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { e.target.value = preset.name || ''; e.target.blur(); } },
  });
  wrap.appendChild(el('div', { class: 'rename-row' }, [
    el('span', { style: 'font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-soft);font-weight:600' }, 'Name'),
    renameInput,
  ]));

  // Effective state summary row
  const eff = effectiveState(preset.id);
  const effCaption = inheritanceCaption(preset);
  const summary = el('div', { class: 'inherit-caption', style: 'margin:-0.5rem 0 1rem' }, [
