function renderTestCard() {
  const card = el('div', { class: 'broadcast-card' });
  card.appendChild(el('h4', {}, 'Send test alerts'));
  card.appendChild(el('p', { style: 'font-size:0.8rem;color:var(--text-muted);margin:0 0 0.75rem' },
    'Fetch current live data and post sample alerts to a channel for visual verification. Bypasses mute + filters.'));

  // Guild picker — only admin-bot guilds are valid
  const guildSel = el('select', { class: 'form-select', style: 'width:100%;margin-bottom:0.4rem' });
  guildSel.appendChild(el('option', { value: '' }, '(select a server)'));
  for (const g of state.guilds || []) {
    if (!g.has_bot) continue;
    guildSel.appendChild(el('option', { value: g.id }, g.name || g.id));
  }
  guildSel.value = botctl.test.guildId || '';
  guildSel.onchange = async (e) => {
    botctl.test.guildId = e.target.value;
    botctl.test.channelId = '';
    botctl.test.channels = [];
    if (botctl.test.guildId) {
      try {
        const chans = await api(`/api/dashboard/guilds/${botctl.test.guildId}/channels`);
        botctl.test.channels = chans || [];
      } catch (_) { botctl.test.channels = []; }
    }
    refreshTestChannelSelect();
  };
  card.appendChild(guildSel);

  const chanSel = el('select', { class: 'form-select', id: 'botctl-test-chan', style: 'width:100%;margin-bottom:0.4rem' });
  chanSel.onchange = (e) => { botctl.test.channelId = e.target.value; };
  card.appendChild(chanSel);

  const typeSel = el('select', { class: 'form-select', style: 'width:100%;margin-bottom:0.6rem' });
  for (const t of _BOTCTL_ALERT_TYPES) {
    typeSel.appendChild(el('option', { value: t.value }, t.label));
  }
  typeSel.value = botctl.test.alertType;
  typeSel.onchange = (e) => { botctl.test.alertType = e.target.value; };
  card.appendChild(typeSel);

  const btn = el('button', {
    class: 'btn btn-primary btn-sm',
    onclick: () => {
      if (!botctl.test.guildId || !botctl.test.channelId) {
        toast('Pick a server and channel first.', 'err');
        return;
      }
      enqueueBotAction('test', {
        guild_id: botctl.test.guildId,
        channel_id: botctl.test.channelId,
        alert_type: botctl.test.alertType,
      });
    },
  }, [el('i', { class: 'fa-solid fa-paper-plane' }), ' Queue test']);
  card.appendChild(btn);

  // Seed with current state after appending
  setTimeout(() => refreshTestChannelSelect(), 0);
  return card;
}

function refreshTestChannelSelect() {
  const sel = document.getElementById('botctl-test-chan');
  if (!sel) return;
  sel.innerHTML = '';
  if (!botctl.test.channels.length) {
    sel.appendChild(el('option', { value: '' }, '(select a server first)'));
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  sel.appendChild(el('option', { value: '' }, '(select a channel)'));
  for (const c of botctl.test.channels) {
    sel.appendChild(el('option', { value: c.id }, '#' + (c.name || c.id)));
  }
  if (botctl.test.channelId) sel.value = botctl.test.channelId;
}

function renderCleanupBody() {
  if (botctl.cleanup.loading) {
    return el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Checking…']);
  }
  if (botctl.cleanup.error) {
    return el('div', { class: 'empty' }, [el('i', { class: 'fa-solid fa-triangle-exclamation' }), ' ', botctl.cleanup.error]);
  }
  if (botctl.cleanup.candidates === null) {
    return el('div', { class: 'empty', style: 'padding:0.4rem 0' }, 'Click "Check for orphans" to scan.');
  }
  const list = botctl.cleanup.candidates;
  if (!list.length) {
    return el('div', { class: 'empty', style: 'padding:0.4rem 0' }, [el('i', { class: 'fa-solid fa-check' }), ' All configured guilds match bot presence. Nothing to clean up.']);
  }
  const wrap = el('div', {});
  const tblWrap = el('div', { class: 'admin-table-wrap' });
  const tbl = el('table', { class: 'admin-table' });
  tbl.appendChild(el('thead', {}, el('tr', {}, [
    el('th', {}, ''),
    el('th', {}, 'Guild'),
    el('th', {}, 'Presets'),
    el('th', {}, 'Channels'),
    el('th', {}, 'Pager'),
  ])));
  const selected = new Set();
  const tb = el('tbody', {});
  for (const g of list) {
    const cb = el('input', { type: 'checkbox' });
    cb.checked = true; selected.add(g.guild_id);
    cb.onchange = () => { if (cb.checked) selected.add(g.guild_id); else selected.delete(g.guild_id); };
    tb.appendChild(el('tr', {}, [
      el('td', {}, cb),
      el('td', {}, [
        g.icon_url ? el('img', { class: 'g-icon', src: g.icon_url, alt: '' }) : null,
        el('span', { class: 'g-name' }, g.name || '—'),
        el('span', { class: 'g-id' }, g.guild_id),
      ]),
      el('td', {}, String(g.preset_count)),
      el('td', {}, String(g.channel_count)),
      el('td', {}, String(g.pager_presets)),
    ]));
  }
  tbl.appendChild(tb);
  tblWrap.appendChild(tbl);
  wrap.appendChild(tblWrap);
  wrap.appendChild(el('div', { style: 'display:flex;gap:0.4rem;margin-top:0.5rem' }, [
    el('button', {
      class: 'btn btn-danger btn-sm',
      onclick: async () => {
        const ids = [...selected];
        if (!ids.length) { toast('Select at least one guild.', 'err'); return; }
        const ok = await confirmDialog(
          'Delete orphaned data?',
          `This will delete all presets and mute-state rows for ${ids.length} guild${ids.length === 1 ? '' : 's'}. Irreversible.`,
          'Delete', /*okDanger=*/true);
        if (!ok) return;
        await enqueueBotAction('cleanup', { guild_ids: ids });
        botctl.cleanup.candidates = null;
        const host = document.getElementById('botctl-cleanup-host');
        if (host) { host.innerHTML = ''; host.appendChild(renderCleanupBody()); }
      },
    }, [el('i', { class: 'fa-solid fa-trash' }), ' Delete selected']),
  ]));
  return wrap;
}

function renderBotActionsTable() {
  const wrap = el('div', {});
  if (botctl.actions.loading) {
    wrap.appendChild(el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Loading…']));

    el('th', {}, 'Status'),

  ])));

  wrap.appendChild(tblWrap);
  wrap.appendChild(el('div', { style: 'display:flex;gap:0.4rem;margin-top:0.4rem' }, [
    el('button', { class: 'btn btn-ghost btn-sm', onclick: () => loadBotActions() },
      [el('i', { class: 'fa-solid fa-rotate' }), ' Refresh']),
  ]));
  return wrap;
}

function summarizeActionResult(action, r) {
  try {
    if (!r) return '—';
    if (action === 'sync') return `synced ${r.synced_global || 0} global`;
    if (action === 'test') {
      const errs = (r.errors || []).length;
      return `sent ${r.sent || 0}${errs ? ` · ${errs} warning${errs === 1 ? '' : 's'}` : ''}`;
    }
    if (action === 'cleanup') {
      const ok = (r.results || []).filter(x => x.ok).length;
      const presets = (r.results || []).reduce((n, x) => n + (x.presets || 0), 0);
      return `${ok} guild${ok === 1 ? '' : 's'}, ${presets} preset${presets === 1 ? '' : 's'} removed`;
    }
    if (action === 'broadcast') {
      const sent = r.sent || 0;
      const total = r.total || 0;
      const failed = total - sent;
      return `delivered ${sent}/${total}${failed ? ` · ${failed} failed` : ''}`;
    }
    return JSON.stringify(r).slice(0, 80);
  } catch (_) { return '—'; }
}

function renderBroadcast() {
  if (!bcast.loaded && !bcast.loading) {
    // fire & forget; component re-renders when targets arrive
    loadBroadcastTargets();
  }

  const wrap = el('div', {});
  wrap.appendChild(el('h3', { class: 'section-head' }, 'Broadcast announcement'));

  const grid = el('div', { class: 'broadcast-grid' });
  grid.appendChild(renderBcastForm());
  grid.appendChild(renderBcastPreview());
  wrap.appendChild(grid);

  // Targets
  wrap.appendChild(el('h3', { class: 'section-head' },
    `Target channels (${bcast.targets.filter(t => t.include).length} of ${bcast.targets.length} selected)`));
  wrap.appendChild(renderBcastTargets());

  // Action row
  const actionRow = el('div', { style: 'display:flex;gap:0.5rem;align-items:center;margin-top:1rem;flex-wrap:wrap' });
  const sendBtn = el('button', {
    class: 'btn btn-primary',
    onclick: () => submitBroadcast(),
  }, bcast.sending
    ? [el('span', { class: 'spinner' }), ' Sending…']
    : [el('i', { class: 'fa-solid fa-paper-plane' }), ' Send to selected']);
  if (bcast.sending) sendBtn.disabled = true;
  actionRow.appendChild(sendBtn);

  actionRow.appendChild(el('button', {
    class: 'btn btn-ghost btn-sm',
    onclick: () => { bcast.targets.forEach(t => { t.include = !!t.detected_channel_id; t.selected_channel_id = t.detected_channel_id || t.selected_channel_id; }); render(); },
  }, 'Reset to auto-detected'));
  actionRow.appendChild(el('button', {
    class: 'btn btn-ghost btn-sm',
    onclick: () => { bcast.targets.forEach(t => { t.include = false; }); render(); },
  }, 'Select none'));
  actionRow.appendChild(el('button', {
    class: 'btn btn-ghost btn-sm',
    onclick: () => { bcast.targets.forEach(t => { t.include = !!t.selected_channel_id; }); render(); },
  }, 'Select all'));

  wrap.appendChild(actionRow);

  // Last-run results
  if (bcast.lastResults) {
    wrap.appendChild(renderBcastResults(bcast.lastResults));
  }

  return wrap;
}

function renderBcastForm() {
  const card = el('div', { class: 'broadcast-card' });
  card.appendChild(el('h4', {}, 'Embed content'));
  card.appendChild(el('label', {}, 'Title'));
  card.appendChild(el('input', {
    type: 'text', maxlength: '256',
    value: bcast.form.title,
    oninput: (e) => { bcast.form.title = e.target.value; updateBcastPreview(); },
  }));
  card.appendChild(el('label', {}, 'Description (markdown allowed)'));
  const ta = el('textarea', {
    maxlength: '4000',
    oninput: (e) => { bcast.form.description = e.target.value; updateBcastPreview(); },
  });
  ta.value = bcast.form.description;
  card.appendChild(ta);
  card.appendChild(el('label', {}, 'Footer (optional)'));
  card.appendChild(el('input', {
    type: 'text', maxlength: '2048',
    value: bcast.form.footer,
    oninput: (e) => { bcast.form.footer = e.target.value; updateBcastPreview(); },
  }));
  card.appendChild(el('label', {}, 'Link URL (optional)'));
  card.appendChild(el('input', {
    type: 'url',
    value: bcast.form.url,
    oninput: (e) => { bcast.form.url = e.target.value; },
  }));
  card.appendChild(el('label', {}, 'Accent colour'));
  const colorRow = el('div', { class: 'color-row' });
  const ci = el('input', { type: 'color', value: bcast.form.color,
    oninput: (e) => { bcast.form.color = e.target.value; updateBcastPreview(); } });
  const cx = el('input', { type: 'text', value: bcast.form.color,
    style: 'max-width:120px',
    oninput: (e) => { bcast.form.color = e.target.value; ci.value = e.target.value; updateBcastPreview(); } });
  colorRow.appendChild(ci);
  colorRow.appendChild(cx);
  card.appendChild(colorRow);
  return card;
}

function renderBcastPreview() {
  const card = el('div', { class: 'broadcast-card' });
  card.appendChild(el('h4', {}, 'Preview'));
  const pv = el('div', { class: 'broadcast-preview', id: 'bcast-preview' });
  pv.style.borderLeftColor = bcast.form.color || 'var(--accent)';
  pv.appendChild(el('div', { class: 'bp-title', id: 'bcast-pv-title' }, bcast.form.title || '(no title)'));
  pv.appendChild(el('div', { class: 'bp-desc', id: 'bcast-pv-desc' }, bcast.form.description || '(no description)'));
  if (bcast.form.footer) pv.appendChild(el('div', { class: 'bp-footer', id: 'bcast-pv-footer' }, bcast.form.footer));
  card.appendChild(pv);
  return card;
}

function updateBcastPreview() {
  // Patch preview inline so typing doesn't force a full re-render (would lose focus).
  const pv = qs('bcast-preview');
  if (!pv) return;
  pv.style.borderLeftColor = bcast.form.color || '#f97316';
  const t = qs('bcast-pv-title');
  if (t) t.textContent = bcast.form.title || '(no title)';
  const d = qs('bcast-pv-desc');
  if (d) d.textContent = bcast.form.description || '(no description)';
  let f = qs('bcast-pv-footer');
  if (bcast.form.footer) {
    if (!f) {
      f = el('div', { class: 'bp-footer', id: 'bcast-pv-footer' }, '');
      pv.appendChild(f);
    }
    f.textContent = bcast.form.footer;
  } else if (f) {
    f.remove();
  }
}

function renderBcastTargets() {
  if (bcast.loading) {
    return el('div', { class: 'empty' }, [el('span', { class: 'spinner' }), ' Loading targets…']);
  }
  if (!bcast.targets.length) {
    return el('div', { class: 'empty' }, 'No guilds with presets found.');
  }
  const tblWrap = el('div', { class: 'admin-table-wrap' });
  const tbl = el('table', { class: 'admin-table' });
  tbl.appendChild(el('thead', {}, el('tr', {}, [
    el('th', { style: 'width:34px' }, ''),
    el('th', {}, 'Server'),
    el('th', {}, 'Channel'),
    el('th', {}, 'Status'),
  ])));
  const tb = el('tbody', {});
  for (const t of bcast.targets) {
    const cb = el('input', { type: 'checkbox' });
    cb.checked = !!t.include;
    cb.onchange = () => { t.include = cb.checked; render(); };

    const sel = el('select', { class: 'ch-pick' });
    if (!t.channels || !t.channels.length) {
      sel.appendChild(el('option', { value: '' }, '(no text channels)'));
      sel.disabled = true;
    } else {
      for (const c of t.channels) {
        sel.appendChild(el('option', { value: c.id }, '#' + (c.name || c.id)));
      }
    }
    if (t.selected_channel_id) sel.value = String(t.selected_channel_id);
    sel.onchange = (e) => { t.selected_channel_id = e.target.value; render(); };

    const auto = t.detected_channel_id && String(t.detected_channel_id) === String(t.selected_channel_id)
      ? el('span', { class: 'bcast-auto' }, 'auto') : null;

    let status = t.include ? el('span', { class: 'bcast-state' }, 'ready') : el('span', { class: 'bcast-state' }, 'skipped');
    const last = bcast.lastResults && (bcast.lastResults.results || [])
      .find(r => String(r.guild_id) === String(t.guild_id) && String(r.channel_id) === String(t.selected_channel_id));
    if (last) {
      status = last.ok
        ? el('span', { class: 'bcast-state ok' }, [el('i', { class: 'fa-solid fa-check' }), ' sent'])
        : el('span', { class: 'bcast-state err', title: last.error || '' }, [el('i', { class: 'fa-solid fa-xmark' }), ' ' + (last.error || 'failed')]);
    }

    tb.appendChild(el('tr', {}, [
      el('td', {}, cb),
      el('td', {}, [
        t.guild_icon_url ? el('img', { class: 'g-icon', src: t.guild_icon_url, alt: '' }) : null,
        el('span', { class: 'g-name' }, t.guild_name || '—'),
        el('span', { class: 'g-id' }, t.guild_id),
      ]),
      el('td', {}, [sel, auto]),
      el('td', {}, status),
    ]));
  }
  tbl.appendChild(tb);
  tblWrap.appendChild(tbl);
  return tblWrap;
}

function renderBcastResults(res) {
  const wrap = el('div', { style: 'margin-top:1rem' });
  wrap.appendChild(el('h3', { class: 'section-head' },
    `Last run: ${res.sent}/${res.total} delivered`));
  return wrap;
}

function timeAgo(iso) {
  try {
    const then = new Date(iso).getTime();
    return formatAge(Math.max(0, Math.floor((Date.now() - then) / 1000)));
  } catch (_) { return '—'; }
}

function formatAge(secs) {
  secs = Math.max(0, Number(secs) || 0);
  if (secs < 60) return `${secs}s`;
  if (secs < 3600) return `${Math.floor(secs/60)}m`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h`;
  return `${Math.floor(secs/86400)}d`;
}

/* -------------------- Role modal -------------------- */

let roleModalCtx = null; // { presetId, selected:Set }

function openRoleModal(presetId) {
  const preset = presetById(presetId);
  if (!preset) return;
  const current = parseRoleIds(preset.role_ids);
  roleModalCtx = {
    presetId,
    selected: new Set(current),
  };
  qs('role-modal-title').textContent = `Role pings · ${preset.name}`;
  const ch = channelById(preset.channel_id);
  qs('role-modal-sub').textContent = `#${ch ? ch.name : ''} · choose up to ${MAX_ROLES} roles to ping.`;
  qs('role-search').value = '';
  renderRoleOptions();
  qs('role-modal').classList.add('open');
}

function closeRoleModal() {
  qs('role-modal').classList.remove('open');
  roleModalCtx = null;
}

function renderRoleOptions() {
  if (!roleModalCtx) return;
  const q = qs('role-search').value.trim().toLowerCase();
  const list = qs('role-options');
  list.innerHTML = '';

  const roles = [...state.roles]
    .filter(r => r.name !== '@everyone' && !r.managed)
    .sort((a, b) => {
      const sa = roleModalCtx.selected.has(String(a.id)) ? 0 : 1;
      const sb = roleModalCtx.selected.has(String(b.id)) ? 0 : 1;
      if (sa !== sb) return sa - sb;
      return (b.position ?? 0) - (a.position ?? 0);
    });

  const matches = q ? roles.filter(r => r.name.toLowerCase().includes(q)) : roles;
  if (matches.length === 0) {
    list.appendChild(el('div', { class: 'empty', style: 'margin:0.3rem' }, 'No roles match.'));
  } else {
    for (const r of matches) list.appendChild(renderRoleOpt(r));
  }
  qs('role-count').textContent = `${roleModalCtx.selected.size} / ${MAX_ROLES} selected`;
}

function renderRoleOpt(r) {
  const rid = String(r.id);
  const checked = roleModalCtx.selected.has(rid);
  const atLimit = !checked && roleModalCtx.selected.size >= MAX_ROLES;
  const cb = el('input', { type: 'checkbox' });
  cb.checked = checked;
  cb.disabled = atLimit;
  cb.onchange = () => {
    if (cb.checked) {
      if (roleModalCtx.selected.size >= MAX_ROLES) { cb.checked = false; return; }
      roleModalCtx.selected.add(rid);
    } else {
      roleModalCtx.selected.delete(rid);
    }
    renderRoleOptions();
  };
  const swatch = el('span', { class: 'swatch', style: `background:${discordColorToHex(r.color)}` });
  return el('label', { class: 'role-opt' + (atLimit ? ' disabled' : '') }, [
    cb, swatch, el('span', {}, '@' + r.name)
  ]);
}

async function saveRoleModal() {
  if (!roleModalCtx) return;
  const { presetId, selected } = roleModalCtx;
  const role_ids = Array.from(selected);
  closeRoleModal();
  await patchPreset(presetId, { role_ids });
}

/* -------------------- Drawer / FAB behavior -------------------- */

function syncDrawer() {
  const sb = qs('sidebar');
  const bd = qs('sidebar-backdrop');
  const fab = qs('fab');
  if (!sb || !bd || !fab) return;
  if (isMobile()) {
    if (state.drawerOpen) { sb.classList.add('open'); bd.classList.add('open'); }
    else { sb.classList.remove('open'); bd.classList.remove('open'); }
    fab.style.display = (state.drawerOpen || state.view === 'wizard') ? 'none' : 'inline-flex';
  } else {
    sb.classList.remove('open');
    bd.classList.remove('open');
    fab.style.display = 'none';
  }
}

function toggleDrawer(force) {
  state.drawerOpen = force != null ? !!force : !state.drawerOpen;
  syncDrawer();
}

/* -------------------- Kickoff -------------------- */

qs('hamburger').addEventListener('click', () => toggleDrawer());
qs('sidebar-backdrop').addEventListener('click', () => toggleDrawer(false));
qs('fab').addEventListener('click', () => openWizard());

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (qs('role-modal').classList.contains('open')) { closeRoleModal(); return; }
    if (qs('confirm-modal').classList.contains('open')) {
      qs('confirm-modal').classList.remove('open');
      return;
    }
    if (state.drawerOpen) { toggleDrawer(false); return; }
    if (state.view === 'wizard') { closeWizard(); return; }
  }
});
qs('role-modal').addEventListener('click', (e) => {
  if (e.target === qs('role-modal')) closeRoleModal();
});
qs('confirm-modal').addEventListener('click', (e) => {
  if (e.target === qs('confirm-modal')) qs('confirm-modal').classList.remove('open');
});
window.addEventListener('resize', () => { syncDrawer(); });

bootstrap();
</script>
